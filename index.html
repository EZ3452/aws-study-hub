<!-- Part 1: Head, styles, and HTML structure -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AWS CLF-C02 Study Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0e17;--surface:#111827;--surface-2:#1a2332;--surface-3:#232f42;--border:#2a3a50;--text:#e4e8ef;--text-muted:#8899ad;--accent:#ff9900;--accent-glow:rgba(255,153,0,0.15);--green:#34d399;--red:#f87171;--yellow:#fbbf24;--blue:#60a5fa;--radius:12px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");pointer-events:none;z-index:0}

/* Auth Screen */
.auth-screen{position:fixed;inset:0;z-index:200;background:var(--bg);display:flex;align-items:center;justify-content:center}
.auth-card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:40px;width:380px;max-width:90vw;text-align:center;animation:fadeSlide 0.4s ease}
.auth-card .auth-logo{font-family:'Space Mono',monospace;font-size:24px;font-weight:700;color:var(--accent);margin-bottom:4px;display:flex;align-items:center;justify-content:center;gap:10px}
.auth-card .auth-logo .cube{width:36px;height:36px;background:linear-gradient(135deg,var(--accent),#e68a00);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;color:#000}
.auth-card .auth-sub{font-size:14px;color:var(--text-muted);margin-bottom:28px}
.auth-card .auth-toggle{font-size:13px;color:var(--text-muted);margin-top:18px}
.auth-card .auth-toggle a{color:var(--accent);cursor:pointer;text-decoration:none;font-weight:600}
.auth-card .auth-toggle a:hover{text-decoration:underline}
.auth-input{width:100%;padding:14px 16px;border-radius:10px;border:1px solid var(--border);background:var(--surface-2);color:var(--text);font-size:14px;font-family:inherit;margin-bottom:12px;outline:none;transition:border 0.2s}
.auth-input:focus{border-color:var(--accent)}
.auth-input::placeholder{color:var(--text-muted)}
.auth-btn{width:100%;padding:14px;border-radius:10px;border:none;background:var(--accent);color:#000;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;transition:all 0.2s;margin-top:4px}
.auth-btn:hover{background:#e68a00;transform:translateY(-1px)}
.auth-error{color:var(--red);font-size:13px;min-height:20px;margin-bottom:8px}
.auth-success{color:var(--green);font-size:13px;min-height:20px;margin-bottom:8px}

/* Topbar */
.topbar{position:sticky;top:0;z-index:100;background:rgba(10,14,23,0.85);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:0 24px;height:60px;display:flex;align-items:center;justify-content:space-between}
.logo{display:flex;align-items:center;gap:10px;font-family:'Space Mono',monospace;font-weight:700;font-size:18px;color:var(--accent);letter-spacing:-0.5px}
.logo .cube{width:32px;height:32px;background:linear-gradient(135deg,var(--accent),#e68a00);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;color:#000;font-weight:700}
.nav-tabs{display:flex;gap:4px}
.nav-tab{padding:8px 18px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;background:transparent;color:var(--text-muted);border:none;transition:all 0.2s;font-family:inherit}
.nav-tab:hover{color:var(--text);background:var(--surface)}.nav-tab.active{color:var(--accent);background:var(--accent-glow)}
.topbar-right{display:flex;align-items:center;gap:12px}
.score-pill{display:flex;align-items:center;gap:6px;background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:6px 14px;font-size:13px;font-weight:600;color:var(--accent);font-family:'Space Mono',monospace}
.user-pill{display:flex;align-items:center;gap:6px;background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:6px 14px;font-size:13px;font-weight:600;color:var(--text-muted);cursor:pointer;transition:all 0.2s}
.user-pill:hover{border-color:var(--accent);color:var(--text)}
.user-pill .user-avatar{width:22px;height:22px;border-radius:50%;background:var(--accent);color:#000;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center}

/* Main */
.main{max-width:1100px;margin:0 auto;padding:32px 24px 80px;position:relative;z-index:1}
.section-title{font-family:'Space Mono',monospace;font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:var(--accent);margin-bottom:16px}

/* Stats & Topic grid */
.stats-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;margin-bottom:40px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px;text-align:center}
.stat-card .stat-num{font-family:'Space Mono',monospace;font-size:28px;font-weight:700;color:var(--accent)}
.stat-card .stat-label{font-size:12px;color:var(--text-muted);margin-top:4px;text-transform:uppercase;letter-spacing:1px}
.topic-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px;margin-bottom:40px}
.topic-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;cursor:pointer;transition:all 0.25s;position:relative;overflow:hidden}
.topic-card:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 8px 32px rgba(255,153,0,0.08)}
.topic-card h3{font-size:14px;font-weight:700;margin-bottom:8px;padding-right:30px}
.topic-card .tc-num{font-family:'Space Mono',monospace;font-size:36px;font-weight:700;color:var(--surface-3);position:absolute;top:-4px;right:8px;line-height:1}
.topic-card .tc-stats{font-size:12px;color:var(--text-muted);margin-bottom:8px}
.topic-bar{height:3px;background:var(--surface-3);border-radius:2px;overflow:hidden}
.topic-bar-fill{height:100%;background:linear-gradient(90deg,var(--accent),#00c7b7);border-radius:2px;transition:width 0.5s}
.topic-pct{font-family:'Space Mono',monospace;font-size:11px;color:var(--accent);margin-top:4px;text-align:right}

/* Quiz launcher */
.quiz-launcher{max-width:580px;margin:24px auto 0}
.launcher-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:28px 28px 24px}
.launcher-card h2{font-size:22px;font-weight:700;margin-bottom:4px;text-align:center}
.launcher-card .launcher-sub{font-size:14px;color:var(--text-muted);text-align:center;margin-bottom:24px}
.config-row{margin-bottom:18px}
.config-row-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--text-muted);margin-bottom:8px}
.toggle-group{display:flex;gap:0;background:var(--surface-2);border-radius:10px;border:1px solid var(--border);overflow:hidden}
.toggle-btn{flex:1;padding:10px 6px;font-size:13px;font-weight:600;text-align:center;cursor:pointer;background:transparent;color:var(--text-muted);border:none;border-right:1px solid var(--border);transition:all 0.2s;font-family:inherit;white-space:nowrap}
.toggle-btn:last-child{border-right:none}.toggle-btn:hover{color:var(--text);background:var(--surface-3)}
.toggle-btn.active{color:#000;background:var(--accent);font-weight:700}
.toggle-btn .toggle-sub{display:block;font-size:10px;font-weight:400;opacity:0.7;margin-top:2px}
.toggle-btn.active .toggle-sub{opacity:0.6}
.toggle-btn.active[data-diff="easy"]{background:var(--green);color:#000}
.toggle-btn.active[data-diff="medium"]{background:var(--yellow);color:#000}
.toggle-btn.active[data-diff="hard"]{background:var(--red);color:#fff}
.toggle-btn.active[data-diff="all"]{background:var(--accent);color:#000}
.topic-chips{display:flex;flex-wrap:wrap;gap:6px}
.topic-chip{padding:7px 12px;border-radius:8px;font-size:12px;font-weight:600;background:var(--surface-2);border:1px solid var(--border);cursor:pointer;color:var(--text-muted);transition:all 0.2s;white-space:nowrap}
.topic-chip:hover{border-color:var(--accent);color:var(--text)}
.topic-chip.active{border-color:var(--accent);color:var(--accent);background:var(--accent-glow)}
.launch-btn{width:100%;padding:16px 28px;border-radius:12px;font-size:16px;font-weight:700;cursor:pointer;border:none;background:var(--accent);color:#000;font-family:inherit;transition:all 0.2s;margin-top:6px}
.launch-btn:hover{background:#e68a00;transform:translateY(-1px);box-shadow:0 6px 24px rgba(255,153,0,0.2)}
.launch-btn .launch-info{display:block;font-size:12px;font-weight:500;opacity:0.7;margin-top:2px}
.pool-warning{text-align:center;font-size:13px;color:var(--yellow);margin-top:10px;min-height:20px}

/* Timer */
.timer-bar{height:5px;background:var(--surface-3);border-radius:3px;margin-bottom:20px;overflow:hidden}
.timer-bar-fill{height:100%;border-radius:3px;transition:width 0.1s linear;background:var(--green)}
.timer-bar-fill.warn{background:var(--yellow)}
.timer-bar-fill.danger{background:var(--red)}
.timer-text{font-family:'Space Mono',monospace;font-size:14px;color:var(--text-muted);text-align:right;margin-bottom:8px}
.timer-text.danger{color:var(--red)}

/* Quiz */
.quiz-container{max-width:700px;margin:0 auto}
.quiz-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.quiz-progress{display:flex;gap:3px;flex:1;margin-right:16px}
.quiz-dot{flex:1;height:4px;border-radius:2px;background:var(--surface-3);transition:background 0.3s}
.quiz-dot.correct{background:var(--green)}.quiz-dot.wrong{background:var(--red)}.quiz-dot.current{background:var(--accent)}.quiz-dot.timeout{background:var(--yellow)}
.quiz-counter{font-family:'Space Mono',monospace;font-size:14px;color:var(--text-muted);white-space:nowrap}
.quiz-tags{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.quiz-tag{display:inline-block;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;padding:4px 10px;border-radius:6px}
.quiz-tag-topic{color:var(--accent);background:var(--accent-glow)}
.quiz-tag-easy{color:#000;background:var(--green)}.quiz-tag-medium{color:#000;background:var(--yellow)}.quiz-tag-hard{color:#fff;background:var(--red)}
.quiz-question{font-size:20px;font-weight:600;line-height:1.5;margin-bottom:28px}
.quiz-options{display:flex;flex-direction:column;gap:10px;margin-bottom:20px}
.quiz-option{background:var(--surface);border:2px solid var(--border);border-radius:var(--radius);padding:16px 20px;font-size:15px;cursor:pointer;transition:all 0.2s;display:flex;align-items:flex-start;gap:12px;color:var(--text);text-align:left;width:100%;font-family:inherit}
.quiz-option:hover:not(.locked){border-color:var(--accent);background:var(--accent-glow)}
.quiz-option .opt-letter{font-family:'Space Mono',monospace;font-weight:700;font-size:14px;min-width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;background:var(--surface-3);color:var(--text-muted);flex-shrink:0}
.quiz-option.selected{border-color:var(--accent);background:var(--accent-glow)}
.quiz-option.selected .opt-letter{background:var(--accent);color:#000}
.quiz-option.correct-answer{border-color:var(--green);background:rgba(52,211,153,0.08)}
.quiz-option.correct-answer .opt-letter{background:var(--green);color:#000}
.quiz-option.wrong-answer{border-color:var(--red);background:rgba(248,113,113,0.08)}
.quiz-option.wrong-answer .opt-letter{background:var(--red);color:#000}
.quiz-option.timeout-answer{border-color:var(--yellow);background:rgba(251,191,36,0.08)}
.quiz-option.timeout-answer .opt-letter{background:var(--yellow);color:#000}
.quiz-explain{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px;font-size:14px;line-height:1.6;color:var(--text-muted);margin-bottom:20px;animation:fadeSlide 0.3s ease}
.quiz-explain strong{color:var(--text)}
@keyframes fadeSlide{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.btn{padding:12px 28px;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;border:none;transition:all 0.2s;font-family:inherit}
.btn-primary{background:var(--accent);color:#000}.btn-primary:hover{background:#e68a00;transform:translateY(-1px)}
.btn-secondary{background:var(--surface);color:var(--text);border:1px solid var(--border)}.btn-secondary:hover{border-color:var(--accent)}
.btn-confirm{background:#146eb4;color:#fff;width:100%;padding:14px;font-size:15px;border-radius:10px;border:none;font-weight:700;cursor:pointer;transition:all 0.2s;font-family:inherit;opacity:0.35;pointer-events:none}
.btn-confirm.ready{opacity:1;pointer-events:auto}
.btn-confirm.ready:hover{background:#1a8ae6;transform:translateY(-1px)}
.btn-row{display:flex;gap:10px;justify-content:flex-end}

/* Flashcards */
.flashcard-area{max-width:600px;margin:0 auto;text-align:center}
.flashcard{perspective:1000px;height:320px;cursor:pointer;margin-bottom:24px}
.flashcard-inner{position:relative;width:100%;height:100%;transition:transform 0.5s;transform-style:preserve-3d}
.flashcard.flipped .flashcard-inner{transform:rotateY(180deg)}
.flashcard-face{position:absolute;inset:0;backface-visibility:hidden;background:var(--surface);border:1px solid var(--border);border-radius:16px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px}
.flashcard-back{transform:rotateY(180deg)}
.flashcard-face .fc-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:var(--accent);margin-bottom:16px}
.flashcard-face .fc-text{font-size:18px;line-height:1.6;max-width:440px}
.flashcard-face .fc-hint{font-size:13px;color:var(--text-muted);margin-top:20px}
.fc-nav{display:flex;gap:12px;justify-content:center;align-items:center}
.fc-nav .fc-count{font-family:'Space Mono',monospace;font-size:14px;color:var(--text-muted);min-width:80px;text-align:center}

/* Reference */
.ref-section{margin-bottom:32px}
.ref-section h2{font-size:20px;font-weight:700;margin-bottom:16px;color:var(--text)}
.ref-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px}
.ref-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px}
.ref-card h4{font-size:15px;font-weight:700;margin-bottom:4px;color:var(--accent)}
.ref-card p{font-size:13px;color:var(--text-muted);line-height:1.5}

/* Results */
.results-container{max-width:600px;margin:0 auto;text-align:center}
.results-score{font-family:'Space Mono',monospace;font-size:72px;font-weight:700;color:var(--accent);margin:16px 0}
.results-label{font-size:18px;color:var(--text-muted);margin-bottom:32px}
.results-breakdown{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:32px}
.rb-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px}
.rb-card .rb-num{font-family:'Space Mono',monospace;font-size:24px;font-weight:700}
.rb-card .rb-label{font-size:12px;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px}

/* Responsive */
@media(max-width:640px){.topbar{padding:0 12px}.nav-tabs{gap:2px}.nav-tab{padding:6px 10px;font-size:12px}.main{padding:20px 12px 60px}.topic-grid{grid-template-columns:1fr 1fr}.quiz-question{font-size:17px}.flashcard{height:280px}.score-pill{display:none}.stats-row{grid-template-columns:repeat(2,1fr)}.launcher-card{padding:20px 16px 18px}.toggle-btn{padding:10px 4px;font-size:12px}.lb-podium{padding:0}.user-pill span:not(.user-avatar){display:none}}

.view{display:none}.view.active{display:block;animation:fadeSlide 0.3s ease}
.app-wrap{display:none}
.loading-overlay{position:fixed;inset:0;background:var(--bg);z-index:300;display:flex;align-items:center;justify-content:center;font-family:'Space Mono',monospace;color:var(--accent);font-size:16px}
</style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay">Loading...</div>

<!-- Auth Screen -->
<div class="auth-screen" id="authScreen" style="display:none;">
<div class="auth-card">
  <div class="auth-logo"><div class="cube">☁</div>CLF-C02 Study Hub</div>
  <p class="auth-sub" id="authSub">Sign in to track your progress</p>
  <div class="auth-error" id="authError"></div>
  <div class="auth-success" id="authSuccess"></div>
  <input class="auth-input" id="authUser" placeholder="Username" maxlength="20" autocomplete="off">
  <input class="auth-input" id="authPass" placeholder="Password" type="password" maxlength="40">
  <button class="auth-btn" id="authBtn" onclick="handleAuth()">Sign In</button>
  <div class="auth-toggle" id="authToggle">No account? <a onclick="toggleAuthMode()">Create one</a></div>
</div>
</div>

<!-- App -->
<div class="app-wrap" id="appWrap">
<div class="topbar">
<div class="logo"><div class="cube">☁</div><span>CLF-C02 Study Hub</span></div>
<div class="nav-tabs">
<button class="nav-tab active" onclick="showView('dashboard')">Dashboard</button>
<button class="nav-tab" onclick="showView('quiz')">Quiz</button>
<button class="nav-tab" onclick="showView('flashcards')">Cards</button>
<button class="nav-tab" onclick="showView('reference')">Reference</button>
</div>
<div class="topbar-right">
<div class="score-pill" id="scorePill">🏆 <span id="totalScore">0</span></div>
<div class="user-pill" onclick="logout()" title="Click to sign out"><div class="user-avatar" id="userAvatar">?</div><span id="userName">User</span></div>
</div>
</div>

<div class="main">
<div class="view active" id="view-dashboard">
<div class="section-title">Your Progress</div>
<div class="stats-row" id="statsRow"></div>
<div class="section-title">Topics</div>
<div class="topic-grid" id="topicGrid"></div>
<div class="section-title">Study</div>
<div style="display:flex;gap:12px;flex-wrap:wrap;">
<button class="btn btn-primary" onclick="showView('quiz')">📝 Take a Quiz</button>
<button class="btn btn-secondary" onclick="showView('flashcards')">🃏 Flashcards</button>
<button class="btn btn-secondary" onclick="showView('reference')">📚 Reference</button>
</div>
</div>

<div class="view" id="view-quiz">
<div class="quiz-launcher" id="quizConfig">
<div class="launcher-card">
<h2>Generate Quiz</h2>
<p class="launcher-sub">Customize your practice session</p>
<div class="config-row"><div class="config-row-label">Questions</div>
<div class="toggle-group"><button class="toggle-btn active" data-val="10" onclick="setToggle('count',this)">10<span class="toggle-sub">Quick</span></button><button class="toggle-btn" data-val="30" onclick="setToggle('count',this)">30<span class="toggle-sub">Standard</span></button><button class="toggle-btn" data-val="50" onclick="setToggle('count',this)">50<span class="toggle-sub">Deep</span></button><button class="toggle-btn" data-val="65" onclick="setToggle('count',this)">65<span class="toggle-sub">Exam sim</span></button></div></div>
<div class="config-row"><div class="config-row-label">Difficulty</div>
<div class="toggle-group"><button class="toggle-btn active" data-val="all" data-diff="all" onclick="setToggle('diff',this)">All<span class="toggle-sub">Mixed</span></button><button class="toggle-btn" data-val="1" data-diff="easy" onclick="setToggle('diff',this)">Easy<span class="toggle-sub">Fundamentals</span></button><button class="toggle-btn" data-val="2" data-diff="medium" onclick="setToggle('diff',this)">Medium<span class="toggle-sub">Applied</span></button><button class="toggle-btn" data-val="3" data-diff="hard" onclick="setToggle('diff',this)">Hard<span class="toggle-sub">Tricky</span></button></div></div>
<div class="config-row"><div class="config-row-label">Timer</div>
<div class="toggle-group"><button class="toggle-btn active" data-val="0" onclick="setToggle('timer',this)">Off<span class="toggle-sub">No rush</span></button><button class="toggle-btn" data-val="30" onclick="setToggle('timer',this)">30s<span class="toggle-sub">Quick</span></button><button class="toggle-btn" data-val="60" onclick="setToggle('timer',this)">60s<span class="toggle-sub">Standard</span></button><button class="toggle-btn" data-val="90" onclick="setToggle('timer',this)">90s<span class="toggle-sub">Relaxed</span></button></div></div>
<div class="config-row"><div class="config-row-label">Topic</div>
<div class="topic-chips" id="topicChips"></div></div>
<button class="launch-btn" onclick="launchQuiz()">Start Quiz →<span class="launch-info" id="launchInfo">10 questions · All · No timer</span></button>
<div class="pool-warning" id="poolWarning"></div>
</div></div>
<div class="quiz-container" id="quizArea" style="display:none;"></div>
<div class="results-container" id="resultsArea" style="display:none;"></div>
</div>

<div class="view" id="view-flashcards">
<div class="flashcard-area">
<div class="section-title" id="fcTopicLabel">All Topics</div>
<div style="display:flex;gap:6px;justify-content:center;margin-bottom:24px;flex-wrap:wrap;" id="fcTopicChips"></div>
<div class="flashcard" id="flashcard" onclick="flipCard()">
<div class="flashcard-inner">
<div class="flashcard-face flashcard-front"><div class="fc-label">Term</div><div class="fc-text" id="fcFront"></div><div class="fc-hint">tap to flip</div></div>
<div class="flashcard-face flashcard-back"><div class="fc-label">Definition</div><div class="fc-text" id="fcBack"></div></div>
</div></div>

<script>
const Q=[{"t":1,"dif":1,"q":"What is cloud computing?","o":["A local area network configuration","On-demand IT resource delivery via the internet","A type of physical server hardware","An offline data backup strategy"],"a":1,"e":"Cloud computing delivers compute, storage, database, and other resources on-demand over the internet with pay-as-you-go pricing."},{"t":1,"dif":1,"q":"Which cloud model gives you the MOST control over the infrastructure?","o":["Software as a Service (SaaS)","Platform as a Service (PaaS)","Infrastructure as a Service (IaaS)","Function as a Service (FaaS)"],"a":2,"e":"IaaS gives you control over the OS, middleware, and applications — AWS manages only the physical hardware and virtualization layer."},{"t":1,"dif":1,"q":"In the SaaS model, what does the customer manage?","o":["The operating system and patches","The underlying server hardware","Only their own data and access","The networking and firewall rules"],"a":2,"e":"With SaaS (e.g., Gmail, Salesforce), the provider manages everything. The customer just uses the application and manages their own data and user access."},{"t":1,"dif":1,"q":"Which is a financial benefit of cloud computing?","o":["Higher upfront capital investment","Trading capital expense for variable expense","Maintaining your own data centers","Purchasing hardware in bulk annually"],"a":1,"e":"Cloud shifts costs from CapEx (buying hardware) to OpEx (paying only for what you use), improving cash flow and flexibility."},{"t":1,"dif":2,"q":"What does 'elasticity' mean in the cloud?","o":["Data is replicated across regions","Resources scale automatically with demand","Servers are physically flexible hardware","Storage expands without any limit"],"a":1,"e":"Elasticity means the system automatically provisions and deprovisions resources to match real-time demand — scaling out when busy, in when idle."},{"t":1,"dif":2,"q":"What does the shared responsibility model define?","o":["How AWS splits costs between regions","Which security tasks belong to AWS vs. the customer","The SLA uptime percentages for each service","How data is distributed across Availability Zones"],"a":1,"e":"AWS manages security OF the cloud (infrastructure). Customers manage security IN the cloud (data, IAM, encryption, OS patching)."},{"t":1,"dif":1,"q":"Which is a benefit of deploying in the cloud vs. on-premises?","o":["Slower provisioning for more careful planning","Global deployment in minutes without owning hardware","Complete elimination of all IT staff","Guaranteed zero downtime on all workloads"],"a":1,"e":"Cloud lets you deploy applications in Regions worldwide within minutes, without managing physical data centers."},{"t":1,"dif":2,"q":"What is a hybrid cloud deployment?","o":["Using two public cloud providers together","Combining on-premises infrastructure with cloud resources","Running cloud workloads without internet access","A cloud region with only one Availability Zone"],"a":1,"e":"Hybrid cloud connects on-premises infrastructure with cloud resources, letting data and apps move between them."},{"t":1,"dif":1,"q":"What is a private cloud?","o":["Any cloud accessible via the public internet","Cloud infrastructure dedicated to one organization","A free tier of a public cloud provider","An edge location for content caching"],"a":1,"e":"A private cloud is dedicated infrastructure for a single organization, offering more control and isolation — hosted on-prem or by a provider."},{"t":1,"dif":3,"q":"In the 6 R's of migration, which means switching to a SaaS product?","o":["Rehost","Replatform","Repurchase","Refactor"],"a":2,"e":"Repurchase means replacing your existing application with a different product, typically a SaaS solution like Salesforce or Workday."},{"t":1,"dif":2,"q":"What does 'agility' refer to in cloud benefits?","o":["The physical speed of AWS network cables","The ability to quickly provision and iterate on resources","The number of programming languages AWS supports","The flexibility of AWS pricing tiers"],"a":1,"e":"Cloud agility means spinning up resources in minutes, experimenting fast, and iterating without long procurement cycles."},{"t":1,"dif":1,"q":"What does 'pay-as-you-go' pricing mean?","o":["A fixed monthly fee regardless of usage","Pay only for the resources you actually consume","An annual subscription with refund options","Free services funded by advertising revenue"],"a":1,"e":"Pay-as-you-go means you're billed only for the compute, storage, and data transfer you actually use — no upfront commitments."},{"t":1,"dif":2,"q":"What does 'economy of scale' mean for cloud customers?","o":["Each customer builds their own data center","AWS passes volume-based savings to customers as lower prices","Larger instances always cost less per hour","Only enterprise customers receive discounts"],"a":1,"e":"AWS aggregates massive usage across thousands of customers, achieving cost efficiencies that translate to lower prices for everyone."},{"t":1,"dif":3,"q":"Which migration strategy involves re-architecting an app to be cloud-native?","o":["Rehost (lift and shift)","Replatform (lift and reshape)","Repurchase (drop and shop)","Refactor (re-architect)"],"a":3,"e":"Refactoring means redesigning the application to take full advantage of cloud-native features like serverless, microservices, and managed services."},{"t":1,"dif":2,"q":"What is the AWS Cloud Adoption Framework (CAF)?","o":["A programming framework for building AWS apps","Guidance for planning cloud migration across 6 perspectives","A set of pre-built CloudFormation templates","An automated migration tool for databases"],"a":1,"e":"CAF helps organizations plan cloud adoption across Business, People, Governance, Platform, Security, and Operations perspectives."},{"t":1,"dif":1,"q":"What does 'global reach' mean as a cloud benefit?","o":["AWS has sales offices in every country","You can deploy apps near users worldwide in minutes","All AWS services are available in every Region","International data transfer is always free"],"a":1,"e":"AWS Regions span the globe, letting you deploy close to end users for low latency without building physical infrastructure."},{"t":1,"dif":2,"q":"What is 'loose coupling' in cloud architecture?","o":["Connecting all servers directly to each other","Designing components to operate independently via interfaces","Using a single monolithic application server","Hardcoding IP addresses between services"],"a":1,"e":"Loose coupling means components interact through APIs or queues so they can fail, scale, and update independently."},{"t":1,"dif":3,"q":"Which is NOT one of the six pillars of the Well-Architected Framework?","o":["Operational Excellence","Automation","Cost Optimization","Sustainability"],"a":1,"e":"The six pillars are Operational Excellence, Security, Reliability, Performance Efficiency, Cost Optimization, and Sustainability. Automation is a principle, not a pillar."},{"t":1,"dif":2,"q":"What does 'Replatform' mean in the 6 R's of migration?","o":["Move to the cloud with zero changes at all","Make targeted optimizations without changing core architecture","Completely re-architect for cloud-native design","Decommission the application entirely"],"a":1,"e":"Replatform (lift and reshape) means making a few cloud optimizations — like moving a database to RDS — without re-architecting the whole app."},{"t":1,"dif":1,"q":"What is a public cloud?","o":["A cloud only used by government agencies","Cloud resources shared across multiple organizations via the internet","A cloud with no security or encryption","An on-premises data center with public Wi-Fi"],"a":1,"e":"A public cloud (like AWS, Azure, GCP) provides resources to multiple tenants over the internet, with logical isolation between them."},{"t":2,"dif":1,"q":"Which EC2 pricing option has NO upfront commitment?","o":["Reserved Instances","Spot Instances","On-Demand Instances","Savings Plans"],"a":2,"e":"On-Demand lets you pay per second/hour with zero commitment — ideal for unpredictable or short-term workloads."},{"t":2,"dif":2,"q":"Which pricing model offers steep discounts but can be interrupted by AWS?","o":["On-Demand Instances","Reserved Instances","Spot Instances","Dedicated Hosts"],"a":2,"e":"Spot Instances use spare EC2 capacity at up to 90% off, but AWS can reclaim them with a 2-minute warning."},{"t":2,"dif":2,"q":"What is the primary purpose of AWS Budgets?","o":["Visualizing past cost trends in graphs","Setting spending alerts and threshold notifications","Estimating costs for new architectures","Downloading the most detailed billing data"],"a":1,"e":"AWS Budgets lets you define custom spending thresholds and receive email or SNS alerts when you approach or exceed them."},{"t":2,"dif":1,"q":"Which tool provides graphs of your AWS costs over time?","o":["AWS Budgets","AWS Cost Explorer","AWS Pricing Calculator","AWS CloudTrail"],"a":1,"e":"Cost Explorer visualizes your cost and usage data with filters and groupings to identify trends and anomalies."},{"t":2,"dif":1,"q":"What does the AWS Free Tier include?","o":["Unlimited free usage of all services forever","Limited free usage of select services for new accounts","Free premium support for the first year","Free data transfer in all directions globally"],"a":1,"e":"The Free Tier includes Always Free items (Lambda, DynamoDB), 12-Month Free items (EC2 t2.micro, S3 5GB), and short-term trials."},{"t":2,"dif":2,"q":"What is consolidated billing in AWS Organizations?","o":["Splitting one bill across multiple credit cards","Combining usage across accounts for one bill and volume discounts","Automatically reducing your monthly charges","Receiving separate invoices for each AWS service"],"a":1,"e":"Consolidated billing aggregates usage from all Organization member accounts into a single bill, potentially unlocking volume pricing tiers."},{"t":2,"dif":2,"q":"Reserved Instances and Savings Plans can save up to what percentage?","o":["Up to 25% over On-Demand pricing","Up to 50% over On-Demand pricing","Up to 72% over On-Demand pricing","Up to 95% over On-Demand pricing"],"a":2,"e":"1 or 3 year commitments via Reserved Instances or Savings Plans can save up to 72% compared to On-Demand pricing."},{"t":2,"dif":1,"q":"Which tool estimates costs BEFORE you deploy resources?","o":["AWS Cost Explorer","AWS Pricing Calculator","AWS Budgets","AWS Cost and Usage Report"],"a":1,"e":"The Pricing Calculator lets you model an architecture and get a monthly cost estimate before spending anything."},{"t":2,"dif":2,"q":"How does AWS typically charge for data transfer?","o":["Both inbound and outbound are charged equally","Inbound is free; outbound is charged per GB","All data transfer is free for the first year","Only cross-region transfers incur any charges"],"a":1,"e":"Data IN to AWS is generally free. Data OUT to the internet is charged per GB with tiered pricing that decreases with volume."},{"t":2,"dif":2,"q":"What is the primary benefit of cost allocation tags?","o":["They speed up EC2 instance performance","They automatically encrypt tagged resources","They categorize costs by project, team, or environment","They provide DDoS protection for tagged resources"],"a":2,"e":"Tags let you label resources with metadata (project, department, environment) and filter/group costs in Cost Explorer."},{"t":2,"dif":3,"q":"What does the AWS Cost and Usage Report (CUR) provide?","o":["Real-time spending alerts via email and SMS","The most granular cost and usage data, delivered to S3","Automated recommendations for cost savings","Visual dashboards of monthly spending trends"],"a":1,"e":"CUR is the most comprehensive billing dataset AWS offers — detailed line-item data delivered as CSV files to an S3 bucket."},{"t":2,"dif":3,"q":"What is AWS Compute Savings Plans?","o":["A free tier for compute services only","A flexible discount for consistent $/hr compute commitment","A monitoring tool for compute utilization","A reservation for specific instance types and sizes"],"a":1,"e":"Compute Savings Plans offer up to 66% off On-Demand in exchange for committing to a consistent compute spend ($/hr) for 1-3 years, flexible across instance families and Regions."},{"t":2,"dif":1,"q":"Which support plan is included free with every AWS account?","o":["Developer support plan","Business support plan","Basic support plan","Enterprise support plan"],"a":2,"e":"Basic support is free and includes documentation, whitepapers, support forums, and limited Trusted Advisor checks."},{"t":2,"dif":2,"q":"Which support plan includes a Technical Account Manager (TAM)?","o":["Basic plan","Developer plan","Business plan","Enterprise plan"],"a":3,"e":"Only Enterprise (and Enterprise On-Ramp) plans include a designated TAM who provides proactive guidance."},{"t":2,"dif":3,"q":"Which support plan offers less than 1 hour response for production system down?","o":["Basic plan","Developer plan","Business plan","Enterprise plan"],"a":2,"e":"Business support offers <1 hour response for production system down. Enterprise offers <15 minutes for business-critical system down."},{"t":2,"dif":2,"q":"What is AWS Marketplace?","o":["A physical retail store for AWS hardware","A digital catalog to buy and deploy third-party software on AWS","An internal job board for AWS employees","A comparison tool for cloud provider pricing"],"a":1,"e":"Marketplace is a curated digital catalog of AMIs, SaaS, and containers from third-party vendors that run on AWS."},{"t":2,"dif":2,"q":"Which service gives automated best-practice recommendations including cost savings?","o":["Amazon Inspector","AWS Trusted Advisor","Amazon GuardDuty","AWS CloudTrail"],"a":1,"e":"Trusted Advisor checks your environment and recommends improvements across cost optimization, performance, security, fault tolerance, and service limits."},{"t":2,"dif":3,"q":"What factors determine the cost of using Amazon S3?","o":["Only the number of S3 buckets you create","Only the AWS Region where your bucket is located","Storage amount, requests, data transfer out, and storage class","Only the size of the largest object stored"],"a":2,"e":"S3 pricing depends on how much data you store, how many requests you make, how much data you transfer out, and which storage class you use."},{"t":3,"dif":1,"q":"What is an AWS Region?","o":["A single data center building","A geographic area with multiple Availability Zones","An edge location for content caching","A virtual private network segment"],"a":1,"e":"A Region (e.g., us-east-1) is a geographic area containing multiple isolated Availability Zones."},{"t":3,"dif":1,"q":"What is an Availability Zone (AZ)?","o":["A marketing territory for AWS sales","One or more data centers with independent infrastructure","A content caching endpoint near users","A tier of AWS support coverage"],"a":1,"e":"Each AZ consists of one or more data centers with independent power, cooling, and networking within a Region."},{"t":3,"dif":1,"q":"What is an Edge Location?","o":["A data center inside an Availability Zone","A site where CloudFront caches content near users","An AWS Region with limited services","A VPC subnet in a private network"],"a":1,"e":"Edge locations are CDN endpoints worldwide where CloudFront caches copies of content for low-latency delivery."},{"t":3,"dif":2,"q":"Why should you deploy across multiple Availability Zones?","o":["It automatically reduces your monthly costs","It provides fault tolerance if one AZ has an outage","It increases the size of your EC2 instances","It gives you access to more AWS services"],"a":1,"e":"Multi-AZ deployment ensures that if one AZ experiences an outage, your application continues running in another AZ."},{"t":3,"dif":2,"q":"Which factors should you consider when choosing a Region?","o":["Only the name and number of the Region","Compliance, latency to users, service availability, and pricing","Only the pricing differences between Regions","Only whether the Region supports EC2"],"a":1,"e":"Region choice should consider data residency laws, proximity to users, which services are available there, and cost differences."},{"t":3,"dif":3,"q":"What is an AWS Local Zone?","o":["A smaller version of an Availability Zone for testing","An extension of a Region placed near users for ultra-low latency","A billing zone that determines pricing tier","A restricted zone for government workloads only"],"a":1,"e":"Local Zones extend select Region services to locations closer to end users for single-digit millisecond latency workloads."},{"t":3,"dif":2,"q":"How many Availability Zones does a typical AWS Region have?","o":["Exactly one per Region","Usually three or more per Region","Exactly ten per Region","It varies by your pricing plan"],"a":1,"e":"Most AWS Regions have 3 or more AZs, providing the redundancy needed for high-availability architectures."},{"t":3,"dif":3,"q":"What is AWS Wavelength?","o":["A service for monitoring network latency","Infrastructure at telecom edges for ultra-low latency to 5G devices","A tool for analyzing radio frequency data","A high-speed storage tier for media files"],"a":1,"e":"Wavelength deploys AWS compute and storage at the edge of 5G carrier networks for single-digit ms latency to mobile devices."},{"t":3,"dif":2,"q":"What is AWS Outposts?","o":["A service for decommissioning old hardware","AWS-managed infrastructure installed in your own data center","A tool for exporting data out of AWS","An emergency backup Region for disaster recovery"],"a":1,"e":"Outposts brings AWS infrastructure and services to your on-premises facility for a consistent hybrid cloud experience."},{"t":3,"dif":1,"q":"Which is true about AWS Regions?","o":["All Regions have exactly the same services available","Regions are isolated from each other for fault isolation","Data automatically replicates between all Regions","Regions share the same underlying physical hardware"],"a":1,"e":"Regions are geographically isolated from each other. Data does NOT replicate between Regions unless you explicitly configure it."},{"t":3,"dif":2,"q":"What connects AWS Regions to each other?","o":["Public internet connections only","A high-bandwidth, low-latency private global network","A single shared fiber optic cable","VPN tunnels that customers must configure"],"a":1,"e":"AWS Regions are connected by a private, redundant, high-bandwidth global backbone network for fast inter-Region communication."},{"t":3,"dif":3,"q":"What is an AWS GovCloud Region?","o":["A free Region for nonprofit organizations","An isolated Region for sensitive government workloads and compliance","A Region that only supports military applications","A Region located inside government buildings"],"a":1,"e":"GovCloud Regions are isolated AWS partitions designed to host sensitive data and meet strict US government compliance requirements like FedRAMP and ITAR."},{"t":3,"dif":1,"q":"What is the main purpose of Edge Locations?","o":["Running EC2 instances closer to users","Caching content to reduce latency for end users","Storing long-term archival data cheaply","Processing database queries in parallel"],"a":1,"e":"Edge locations serve cached copies of content (via CloudFront) so users download from a nearby location instead of the origin."},{"t":3,"dif":2,"q":"Can you choose which Availability Zone your resources are deployed in?","o":["No, AWS always chooses automatically","Yes, you can select specific AZs within a Region","Only if you have Enterprise support","Only for S3 and DynamoDB resources"],"a":1,"e":"When launching resources like EC2 instances, you can specify which AZ within your chosen Region to deploy them in."},{"t":4,"dif":1,"q":"What does IAM stand for?","o":["Internet Access Management","Identity and Access Management","Integrated Application Monitoring","Infrastructure Automation Module"],"a":1,"e":"IAM controls who can authenticate (sign in) and what they're authorized (have permissions) to do in your AWS account."},{"t":4,"dif":1,"q":"What is the principle of least privilege?","o":["Giving everyone administrator access by default","Granting only the minimum permissions needed for a task","Blocking all access to resources permanently","Using one shared account for the entire team"],"a":1,"e":"Least privilege reduces risk by ensuring each user or service has only the exact permissions required — nothing more."},{"t":4,"dif":1,"q":"What does MFA add to the login process?","o":["A second password requirement","An extra verification factor beyond the password","Automatic encryption of all stored data","A mandatory VPN connection requirement"],"a":1,"e":"Multi-Factor Authentication requires something you know (password) plus something you have (device code) for stronger security."},{"t":4,"dif":2,"q":"How do IAM Roles differ from IAM Users?","o":["Roles are for humans; Users are for applications","Roles provide temporary credentials; Users have long-term credentials","Roles cost money; Users are free to create","Roles can only be used within a single service"],"a":1,"e":"Roles provide temporary security credentials assumed by entities (EC2 instances, Lambda, other accounts) rather than permanent access keys."},{"t":4,"dif":2,"q":"What format are IAM Policies written in?","o":["XML documents attached to VPCs","JSON documents defining allow/deny permissions","Python scripts executed by Lambda","YAML templates processed by CloudFormation"],"a":1,"e":"IAM Policies are JSON documents that specify what actions are allowed or denied on which AWS resources for which principals."},{"t":4,"dif":1,"q":"Which service provides DDoS protection?","o":["AWS WAF","AWS Shield","Amazon GuardDuty","Amazon Inspector"],"a":1,"e":"AWS Shield provides DDoS protection. Standard is free and automatic; Advanced adds 24/7 response team support and cost protection."},{"t":4,"dif":2,"q":"What does AWS WAF protect against?","o":["DDoS volumetric attacks at the network layer","Common web exploits like SQL injection and XSS","Physical intrusion into data centers","Unauthorized SSH access to EC2 instances"],"a":1,"e":"WAF filters HTTP/HTTPS requests with rules to block SQL injection, cross-site scripting, and other application-layer attacks."},{"t":4,"dif":2,"q":"What does Amazon GuardDuty use to detect threats?","o":["Manual log review by AWS security staff","Machine learning, anomaly detection, and threat intelligence","Network packet inspection at the hardware level","Customer-written detection rules only"],"a":1,"e":"GuardDuty continuously analyzes CloudTrail, VPC Flow Logs, and DNS logs using ML and threat intelligence feeds."},{"t":4,"dif":2,"q":"What does AWS CloudTrail record?","o":["Application performance metrics and CPU utilization","API calls and actions taken in your AWS account","DNS query results for Route 53 domains","The contents of objects stored in S3 buckets"],"a":1,"e":"CloudTrail logs who made what API call, when, from where, and on which resource — essential for auditing and compliance."},{"t":4,"dif":3,"q":"What does Amazon Macie specialize in?","o":["Scanning EC2 instances for software vulnerabilities","Discovering and classifying sensitive data in S3","Providing DDoS mitigation at the network edge","Managing encryption keys across AWS services"],"a":1,"e":"Macie uses ML and pattern matching to find PII, credentials, and other sensitive data in your S3 buckets."},{"t":4,"dif":3,"q":"What does AWS Security Hub do?","o":["Replaces IAM for access management","Aggregates security findings from multiple services into one view","Provides physical security for data centers","Manages SSL/TLS certificates for websites"],"a":1,"e":"Security Hub centralizes findings from GuardDuty, Inspector, Macie, Firewall Manager, and partner tools in one dashboard."},{"t":4,"dif":1,"q":"What does 'encryption at rest' protect?","o":["Data while it's moving across a network","Data while it's stored on disk or in a database","Data while it's being processed in memory","Data while it's displayed on a user's screen"],"a":1,"e":"Encryption at rest scrambles stored data so it can't be read without the decryption key — used in S3, EBS, RDS, and more."},{"t":4,"dif":1,"q":"What does 'encryption in transit' protect?","o":["Data stored on physical hard drives","Data moving between systems over a network","Data cached in an ElastiCache cluster","Data archived in Glacier Deep Archive"],"a":1,"e":"Encryption in transit (via TLS/SSL) prevents data from being intercepted or tampered with as it travels between endpoints."},{"t":4,"dif":2,"q":"Which service manages encryption keys?","o":["Amazon Inspector","AWS KMS","Amazon Macie","AWS Shield"],"a":1,"e":"Key Management Service (KMS) lets you create, manage, and control cryptographic keys used to encrypt your data."},{"t":4,"dif":3,"q":"What are Service Control Policies (SCPs)?","o":["Firewall rules applied to VPC subnets","Permission boundaries for accounts in AWS Organizations","Auto Scaling policies for EC2 instance groups","Billing alerts for consolidated accounts"],"a":1,"e":"SCPs define the maximum permissions available to member accounts — even if IAM allows an action, an SCP can deny it."},{"t":4,"dif":2,"q":"In the shared responsibility model, who patches the guest OS on EC2?","o":["AWS handles all patching automatically","The customer is responsible for guest OS patches","Both AWS and the customer share the patching","Patching is handled by the AMI marketplace vendor"],"a":1,"e":"For EC2, the customer manages the guest OS including patching. AWS manages the underlying host, hypervisor, and physical hardware."},{"t":4,"dif":2,"q":"What is AWS responsible for in the shared responsibility model?","o":["Configuring security group rules for EC2","Managing IAM users and their permissions","Physical security and infrastructure of data centers","Encrypting customer data stored in S3 buckets"],"a":2,"e":"AWS secures the cloud itself: physical facilities, hardware, networking, and the hypervisor layer. Customers secure what's IN the cloud."},{"t":4,"dif":2,"q":"What is Amazon Cognito used for?","o":["Monitoring server CPU and memory metrics","User sign-up, sign-in, and access control for applications","Automated vulnerability scanning of containers","Centralized logging of all API calls"],"a":1,"e":"Cognito handles user authentication and authorization for web and mobile apps, supporting social logins and SAML federation."},{"t":4,"dif":3,"q":"What does AWS IAM Access Analyzer do?","o":["Optimizes IAM policies for better performance","Identifies resources shared with external entities using automated reasoning","Rotates IAM user passwords on a schedule","Monitors IAM user login activity in real time"],"a":1,"e":"Access Analyzer uses mathematical reasoning to identify S3 buckets, IAM roles, and other resources accessible from outside your account."},{"t":4,"dif":3,"q":"What is Amazon Inspector used for?","o":["Inspecting physical hardware in data centers","Automated vulnerability scanning for EC2 and container images","Analyzing the cost efficiency of your resources","Checking if your tags follow naming conventions"],"a":1,"e":"Inspector automatically assesses workloads for software vulnerabilities and unintended network exposure, generating prioritized findings."},{"t":5,"dif":1,"q":"What is Amazon VPC?","o":["A virtual desktop service for remote work","A logically isolated virtual network you define in AWS","A managed VPN service for on-premises connections","A version control platform for infrastructure code"],"a":1,"e":"VPC lets you define your own network with custom IP ranges, subnets, route tables, and gateways."},{"t":5,"dif":2,"q":"What makes a subnet 'public' vs. 'private'?","o":["Public subnets cost more than private subnets","Public subnets have a route to an Internet Gateway; private ones don't","Private subnets are in a different AZ than public ones","Public subnets are encrypted; private subnets are not"],"a":1,"e":"A public subnet routes traffic through an Internet Gateway. Private subnets typically use a NAT Gateway for outbound-only internet."},{"t":5,"dif":2,"q":"What does Amazon Route 53 provide?","o":["Block-level storage volumes for EC2","Scalable DNS, domain registration, and health checking","In-memory caching for databases","Container orchestration for Docker workloads"],"a":1,"e":"Route 53 is a DNS service that translates domain names to IP addresses, offers routing policies, and checks endpoint health."},{"t":5,"dif":1,"q":"What does Amazon CloudFront do?","o":["Provisions virtual servers on demand","Delivers content via a global CDN for low latency","Manages IAM policies and user permissions","Orchestrates multi-step workflows in the cloud"],"a":1,"e":"CloudFront caches content at edge locations worldwide so users access web pages, APIs, and videos from a nearby point."},{"t":5,"dif":2,"q":"What is a Security Group in AWS?","o":["A collection of IAM users with shared permissions","A virtual firewall controlling traffic at the instance level","A group of S3 buckets with the same access policy","A cluster of EC2 instances in the same placement group"],"a":1,"e":"Security Groups are stateful firewalls for instances — you define inbound and outbound allow rules. Return traffic is auto-allowed."},{"t":5,"dif":3,"q":"How do Security Groups differ from Network ACLs (NACLs)?","o":["Security Groups are paid; NACLs are included free of charge","Security Groups are stateful at instance level; NACLs are stateless at subnet level","NACLs handle instance traffic; Security Groups handle subnet traffic","Security Groups use deny rules; NACLs only use allow rules"],"a":1,"e":"Security Groups are stateful (return traffic auto-allowed) at the instance level. NACLs are stateless (must allow both directions) at the subnet level."},{"t":5,"dif":2,"q":"What is AWS Direct Connect?","o":["A managed VPN tunnel over the public internet","A dedicated private network link from your premises to AWS","A service for connecting multiple VPCs together","A tool for transferring DNS zones to Route 53"],"a":1,"e":"Direct Connect provides a private, dedicated connection bypassing the public internet for more consistent performance and lower latency."},{"t":5,"dif":2,"q":"What does Elastic Load Balancing do?","o":["Balances your AWS bill across multiple accounts","Distributes incoming traffic across multiple targets for availability","Automatically patches operating systems on EC2","Compresses data before storing it in S3"],"a":1,"e":"ELB distributes traffic across EC2 instances, containers, or IP addresses across AZs, improving fault tolerance and availability."},{"t":5,"dif":3,"q":"What is a VPC Endpoint?","o":["A public URL for accessing your VPC from the internet","A private connection between your VPC and AWS services without public internet","A DNS record that points to your VPC's gateway","A monitoring endpoint that tracks VPC network traffic"],"a":1,"e":"VPC Endpoints keep traffic between your VPC and services like S3 or DynamoDB within the AWS network — no internet needed."},{"t":5,"dif":3,"q":"What is AWS Transit Gateway?","o":["A billing gateway for consolidated accounts","A central hub connecting multiple VPCs and on-premises networks","An edge location for CloudFront content caching","A serverless function trigger for API calls"],"a":1,"e":"Transit Gateway acts as a central hub — all VPCs and on-premises connections go through it instead of complex peering meshes."},{"t":5,"dif":1,"q":"What is an Internet Gateway in a VPC?","o":["A firewall that blocks all internet traffic","A component that enables communication between a VPC and the internet","A DNS server for resolving domain names","A load balancer for distributing web traffic"],"a":1,"e":"An Internet Gateway allows resources in public subnets to send and receive traffic from the internet."},{"t":5,"dif":2,"q":"What is a NAT Gateway used for?","o":["Allowing inbound internet traffic to private subnets","Allowing private subnet instances to access the internet for outbound traffic","Translating domain names to IP addresses","Connecting two VPCs in different Regions"],"a":1,"e":"NAT Gateway lets instances in private subnets initiate outbound internet connections (e.g., for updates) while blocking unsolicited inbound traffic."},{"t":5,"dif":2,"q":"What is VPC Peering?","o":["Connecting a VPC to the public internet via a gateway","A private network connection between two VPCs using private IP addresses","A monitoring connection between CloudWatch and a VPC","A backup connection between an AZ and an edge location"],"a":1,"e":"VPC Peering creates a private networking link between two VPCs (same or different accounts/Regions) using private IPs — no public internet."},{"t":5,"dif":1,"q":"What is the primary benefit of using a CDN like CloudFront?","o":["It encrypts all data stored in S3 buckets","It reduces latency by serving content from locations near users","It automatically scales EC2 instances based on traffic","It provides DDoS protection at the network layer"],"a":1,"e":"CDNs cache content at edge locations close to users, dramatically reducing the distance data travels and improving load times."},{"t":5,"dif":3,"q":"What is AWS PrivateLink?","o":["A VPN service for remote employee access","A way to privately access services across VPCs without public internet","A dedicated hardware connection like Direct Connect","An encrypted email service for AWS accounts"],"a":1,"e":"PrivateLink provides private connectivity between VPCs, AWS services, and on-premises apps via interface VPC endpoints."},{"t":5,"dif":3,"q":"What types of load balancers does AWS offer?","o":["Only Application Load Balancer for all traffic types","Application (HTTP), Network (TCP/UDP), and Gateway (third-party appliances)","Only Network Load Balancer for TCP connections","Classic Load Balancer is the only option available"],"a":1,"e":"AWS offers ALB (Layer 7 HTTP), NLB (Layer 4 TCP/UDP with ultra-low latency), GLB (for third-party virtual appliances), and legacy CLB."},{"t":6,"dif":1,"q":"What is Amazon EC2?","o":["An object storage service for files","Virtual servers in the cloud with configurable capacity","A managed relational database service","A content delivery network for edge caching"],"a":1,"e":"EC2 provides resizable virtual server instances where you choose the OS, instance type, storage, and network configuration."},{"t":6,"dif":1,"q":"What is AWS Lambda?","o":["A virtual machine with root access","Serverless compute that runs code in response to events","A container orchestration platform","A managed Kubernetes control plane"],"a":1,"e":"Lambda executes your code only when triggered (by API calls, S3 events, etc.) with no server management. You pay per invocation."},{"t":6,"dif":2,"q":"What is AWS Fargate?","o":["A relational database engine for Aurora","Serverless compute for running containers without managing servers","A file storage system shared across instances","A DNS service for routing traffic globally"],"a":1,"e":"Fargate runs Docker containers (via ECS or EKS) without you provisioning or managing the underlying EC2 instances."},{"t":6,"dif":2,"q":"What does AWS Elastic Beanstalk handle for you?","o":["Only database provisioning and patching","Deployment, scaling, load balancing, and monitoring for web apps","Only security group and IAM configuration","Only S3 bucket creation and lifecycle rules"],"a":1,"e":"Beanstalk is a PaaS — upload your code and it handles capacity provisioning, load balancing, auto scaling, health monitoring, and patching."},{"t":6,"dif":1,"q":"What is Amazon Lightsail designed for?","o":["Enterprise-scale high-performance computing clusters","Simple projects with predictable monthly pricing and easy setup","Complex multi-region container orchestration","Real-time data streaming and analytics pipelines"],"a":1,"e":"Lightsail offers simple VPS instances with fixed monthly pricing — great for small websites, blogs, and dev/test environments."},{"t":6,"dif":3,"q":"What is Amazon ECS?","o":["An email sending service for notifications","A container orchestration service for running Docker on AWS","A serverless event bus for routing messages","An in-memory caching service for databases"],"a":1,"e":"Elastic Container Service manages the lifecycle of Docker containers — you can run them on EC2 instances or Fargate."},{"t":6,"dif":3,"q":"What is Amazon EKS?","o":["An encryption key management service","A managed Kubernetes service for containerized applications","An elastic file system for shared storage","An event-driven serverless function runner"],"a":1,"e":"EKS provides a managed Kubernetes control plane so you can run K8s workloads without managing the master nodes."},{"t":6,"dif":2,"q":"What are EC2 instance families optimized for?","o":["Different AWS Regions and Availability Zones","Different workload types like compute, memory, storage, and GPU","Different operating systems and kernel versions","Different pricing tiers and discount levels"],"a":1,"e":"Instance families: T/M (general purpose), C (compute-optimized), R/X (memory), I/D (storage-optimized), P/G (GPU accelerated)."},{"t":6,"dif":2,"q":"What is an EC2 AMI?","o":["A billing metric for instance usage tracking","A pre-configured template with OS, software, and settings for launching instances","A networking protocol for inter-instance communication","A monitoring agent installed on each EC2 instance"],"a":1,"e":"An Amazon Machine Image (AMI) is a template that contains the OS, application server, and applications needed to launch an instance."},{"t":6,"dif":1,"q":"What is the key advantage of serverless computing (e.g., Lambda)?","o":["You get dedicated physical servers for your code","You don't manage any servers — just deploy code and pay per use","You get unlimited compute power at no additional cost","You always have reserved capacity waiting for requests"],"a":1,"e":"Serverless means no infrastructure management — AWS handles provisioning, scaling, patching, and availability. You pay only when code runs."},{"t":6,"dif":2,"q":"What is an EC2 key pair used for?","o":["Encrypting data stored in EBS volumes","Securely connecting to your instance via SSH or RDP","Authenticating API calls to the AWS Management Console","Pairing two EC2 instances for high availability"],"a":1,"e":"A key pair (public key on the instance, private key with you) provides secure SSH (Linux) or RDP password decryption (Windows) access."},{"t":6,"dif":3,"q":"What is an EC2 Placement Group?","o":["A group of instances with the same IAM role attached","A strategy for how instances are placed on underlying hardware","A collection of instances sharing the same EBS volume","A group of instances that share the same public IP address"],"a":1,"e":"Placement Groups let you influence instance placement — Cluster (low latency), Spread (separate hardware), or Partition (fault isolation)."},{"t":6,"dif":2,"q":"What is an Elastic IP address?","o":["A dynamically assigned private IP that changes on reboot","A static public IPv4 address you can associate with an instance","A load balancer endpoint for distributing traffic","An internal DNS name assigned to every EC2 instance"],"a":1,"e":"An Elastic IP is a static public IP you allocate and can reassign between instances — useful when you need a fixed public address."},{"t":6,"dif":1,"q":"What happens to an EC2 instance store when the instance stops?","o":["Data is preserved until the instance is terminated","Data is automatically backed up to S3 for safekeeping","Data is lost — instance store is ephemeral storage","Data is moved to an EBS volume automatically"],"a":2,"e":"Instance store is temporary (ephemeral) storage physically attached to the host. Data is lost when the instance stops or terminates."},{"t":6,"dif":3,"q":"What is AWS Batch?","o":["A service for sending bulk email notifications","A service for running batch computing jobs at any scale","A tool for batching API calls to reduce costs","A feature for grouping CloudWatch metrics together"],"a":1,"e":"AWS Batch dynamically provisions the optimal quantity and type of compute resources to efficiently run batch processing workloads."},{"t":6,"dif":3,"q":"What is Amazon EC2 Auto Scaling Launch Template?","o":["A billing template for estimating monthly EC2 instance costs","A versioned config specifying AMI, instance type, key pair, and security groups","A CloudFormation stack template used for provisioning full VPCs","A pre-built application deployment package for Elastic Beanstalk"],"a":1,"e":"Launch Templates define the instance configuration (AMI, type, network settings, etc.) used by Auto Scaling Groups to launch new instances."},{"t":7,"dif":1,"q":"What is Amazon S3?","o":["A relational database service for SQL queries","Object storage with 11 9's (99.999999999%) durability","A block storage volume attached to EC2 instances","A managed file system using the NFS protocol"],"a":1,"e":"S3 stores objects (files and their metadata) in buckets with virtually unlimited scale and industry-leading durability."},{"t":7,"dif":1,"q":"What is Amazon EBS?","o":["An object storage service accessed via HTTP API","Persistent block storage volumes for EC2 instances","A serverless computing platform for running code","A managed in-memory caching service for databases"],"a":1,"e":"EBS provides block-level volumes (like virtual hard drives) that persist independently of EC2 instance lifecycle."},{"t":7,"dif":2,"q":"What is Amazon EFS?","o":["An email filtering service for businesses","A managed NFS file system shared across multiple EC2 instances","A single-instance block storage alternative to EBS","An object storage class for archival data"],"a":1,"e":"EFS provides a scalable, elastic file system that multiple EC2 instances can mount simultaneously via the NFS protocol."},{"t":7,"dif":2,"q":"Which S3 class is the cheapest for data accessed once or twice a year?","o":["S3 Standard","S3 One Zone-IA","S3 Intelligent-Tiering","S3 Glacier Deep Archive"],"a":3,"e":"Glacier Deep Archive costs as little as $0.00099/GB/month — ideal for data rarely accessed, with 12-48 hour retrieval."},{"t":7,"dif":2,"q":"What does S3 Intelligent-Tiering do?","o":["Encrypts objects automatically based on content type","Moves objects between access tiers based on actual usage patterns","Replicates objects across all AWS Regions automatically","Compresses objects to reduce storage costs"],"a":1,"e":"Intelligent-Tiering monitors access patterns and automatically moves objects between frequent and infrequent access tiers to save cost."},{"t":7,"dif":1,"q":"How does EBS differ from S3?","o":["EBS is for databases only; S3 is for applications only","EBS is block storage for EC2; S3 is object storage via API","EBS is free; S3 requires a paid subscription","EBS stores unlimited data; S3 has a 5TB limit"],"a":1,"e":"EBS is block storage attached to a single EC2 instance (like a hard drive). S3 is object storage accessible from anywhere via HTTP."},{"t":7,"dif":3,"q":"What is AWS Storage Gateway?","o":["A tool for migrating DNS records to Route 53","Hybrid storage connecting on-premises applications to cloud storage","A VPN gateway for encrypting data in transit","A monitoring service for tracking storage utilization"],"a":1,"e":"Storage Gateway provides file, volume, and tape interfaces that connect on-premises environments seamlessly to S3, EBS, and Glacier."},{"t":7,"dif":3,"q":"What are S3 Lifecycle Policies used for?","o":["Controlling who can access specific S3 buckets","Automatically transitioning or deleting objects based on age","Setting up cross-region replication for disaster recovery","Encrypting objects with customer-managed keys"],"a":1,"e":"Lifecycle policies automate moving objects to cheaper storage classes (e.g., Standard → Glacier) or deleting them after a defined period."},{"t":7,"dif":2,"q":"What is S3 Versioning?","o":["A way to name S3 buckets with version numbers","Keeping multiple variants of an object to protect against accidental deletes","A feature that limits how many objects a bucket can hold","An encryption method specific to S3 Standard class"],"a":1,"e":"Versioning preserves every version of every object. If you overwrite or delete, the old version is still recoverable."},{"t":7,"dif":1,"q":"What is the maximum size of a single S3 object?","o":["500 MB","5 GB","5 TB","Unlimited — no maximum size"],"a":2,"e":"A single S3 object can be up to 5 TB. For objects larger than 5 GB, you should use multipart upload."},{"t":7,"dif":2,"q":"What is S3 Cross-Region Replication (CRR)?","o":["Copying IAM policies between AWS accounts","Automatically copying S3 objects to a bucket in a different Region","Moving EC2 instances between Availability Zones","Synchronizing Route 53 DNS records across Regions"],"a":1,"e":"CRR automatically replicates objects from a source bucket to a destination bucket in a different Region for compliance or disaster recovery."},{"t":7,"dif":3,"q":"What is Amazon FSx?","o":["A serverless computing platform designed for batch processing jobs","Managed file systems optimized for Windows, Lustre, NetApp, and OpenZFS workloads","A container registry for building, storing, and deploying Docker images","A data migration service for transferring on-premises databases to AWS"],"a":1,"e":"FSx provides fully managed, high-performance file systems — FSx for Windows File Server, FSx for Lustre (HPC), and others."},{"t":7,"dif":2,"q":"What is the AWS Snow Family used for?","o":["A monitoring tool for tracking snowfall in AWS Regions","Physical devices for migrating large amounts of data to/from AWS","A set of AI services for weather prediction","A storage class for cold data in S3"],"a":1,"e":"Snow devices (Snowcone, Snowball, Snowmobile) physically transport massive data sets to/from AWS when network transfer isn't practical."},{"t":7,"dif":1,"q":"What is S3 Standard-IA designed for?","o":["Frequently accessed data requiring low latency","Infrequently accessed data that still needs fast retrieval when requested","Archival data accessed once every few years","Temporary data that is automatically deleted after 30 days"],"a":1,"e":"Standard-IA is cheaper than S3 Standard but charges a per-GB retrieval fee — ideal for data accessed less often but needed quickly when it is."},{"t":8,"dif":1,"q":"What is Amazon RDS?","o":["A NoSQL key-value database service","A managed relational database supporting multiple SQL engines","A file storage service using the NFS protocol","A real-time data streaming and analytics platform"],"a":1,"e":"RDS manages relational databases (MySQL, PostgreSQL, MariaDB, Oracle, SQL Server, Aurora) — handling patching, backups, and failover."},{"t":8,"dif":1,"q":"What is Amazon DynamoDB?","o":["A managed relational database for SQL queries","A fully managed NoSQL database with single-digit ms latency","A data warehouse for complex analytical queries","A graph database for highly connected datasets"],"a":1,"e":"DynamoDB is serverless NoSQL that auto-scales and provides consistent single-digit millisecond performance at any scale."},{"t":8,"dif":2,"q":"What is Amazon Aurora?","o":["An in-memory caching service using Redis","A cloud-native relational DB compatible with MySQL and PostgreSQL","A document database for storing JSON data","A time-series database for IoT sensor data"],"a":1,"e":"Aurora is MySQL/PostgreSQL-compatible, up to 5x faster than standard MySQL, with automatic 3-AZ replication."},{"t":8,"dif":2,"q":"What is Amazon Redshift?","o":["A NoSQL key-value store for real-time apps","A managed data warehouse optimized for analytics with SQL","An in-memory cache for reducing database read latency","A serverless document database for mobile applications"],"a":1,"e":"Redshift is optimized for running complex analytical queries against petabytes of structured data using familiar SQL."},{"t":8,"dif":2,"q":"What is Amazon ElastiCache?","o":["A data warehouse for analytical queries","Managed in-memory caching using Redis or Memcached","A relational database compatible with MySQL only","An object storage service similar to S3"],"a":1,"e":"ElastiCache puts frequently accessed data in memory for sub-millisecond read times, reducing load on your primary database."},{"t":8,"dif":3,"q":"What is Amazon Neptune?","o":["A managed relational database for financial data","A managed graph database for highly connected datasets","A time-series database for monitoring metrics","A column-oriented database for analytics workloads"],"a":1,"e":"Neptune is optimized for storing and querying relationships — ideal for social networks, knowledge graphs, and fraud detection."},{"t":8,"dif":2,"q":"When should you choose DynamoDB over RDS?","o":["When you need complex multi-table SQL joins","When you need flexible schema, massive scale, and ms latency","When you need strict ACID transactions across tables","When you need compatibility with Oracle or SQL Server"],"a":1,"e":"DynamoDB excels at high-throughput, low-latency workloads with flexible schemas. RDS is better for relational data with complex queries."},{"t":8,"dif":3,"q":"What is DynamoDB Global Tables?","o":["A billing feature for global DynamoDB usage","Multi-Region, multi-active replication for global low-latency access","A schema design tool for DynamoDB tables","A migration tool for moving data from RDS to DynamoDB"],"a":1,"e":"Global Tables replicate a DynamoDB table across multiple Regions with local read/write performance everywhere."},{"t":8,"dif":1,"q":"What does RDS Multi-AZ provide?","o":["Read replicas for scaling read traffic","Automatic failover to a standby in another AZ for high availability","Cross-region replication for disaster recovery","Connection pooling for improved database performance"],"a":1,"e":"Multi-AZ creates a synchronous standby replica in a different AZ — RDS automatically fails over to it if the primary goes down."},{"t":8,"dif":2,"q":"What are RDS Read Replicas used for?","o":["Providing automatic failover for high availability","Scaling read traffic by directing queries to replica copies","Encrypting data stored in the database at rest","Migrating databases between different SQL engines"],"a":1,"e":"Read Replicas are asynchronous copies that handle read queries, reducing the load on your primary database."},{"t":8,"dif":3,"q":"What is Amazon Keyspaces?","o":["A managed Apache Cassandra-compatible database service","A key-value cache like ElastiCache for Redis","An encryption key management service similar to KMS","A physical key card system for data center access"],"a":0,"e":"Amazon Keyspaces is a serverless, managed Apache Cassandra-compatible database for applications needing wide-column store at scale."},{"t":8,"dif":2,"q":"What is Amazon DocumentDB?","o":["A document scanning and OCR service for PDFs","A managed document database compatible with MongoDB","A PDF storage and rendering service for web apps","A service for managing CloudFormation template documents"],"a":1,"e":"DocumentDB is a managed database compatible with MongoDB workloads, designed for JSON document storage at scale."},{"t":8,"dif":1,"q":"What is the primary benefit of managed database services like RDS?","o":["They are always free for the first year of usage","They handle patching, backups, and failover automatically","They support only one database engine per account","They guarantee zero latency for all database queries"],"a":1,"e":"Managed services handle undifferentiated heavy lifting — provisioning, patching, backups, replication, and failover — so you focus on your app."},{"t":8,"dif":3,"q":"What is Amazon Timestream?","o":["A streaming video delivery service like Prime Video","A serverless time-series database for IoT and operational data","A service for scheduling Lambda functions at specific times","A real-time clock synchronization service for EC2 instances"],"a":1,"e":"Timestream is purpose-built for storing and analyzing time-series data (IoT sensor readings, application metrics) at scale."},{"t":9,"dif":1,"q":"What does 'high availability' mean?","o":["All data is encrypted with the strongest cipher","The system stays accessible with minimal downtime","Services are provided completely free of charge","Applications compile and deploy very quickly"],"a":1,"e":"High availability is achieved through redundancy across AZs so the system continues operating even when components fail."},{"t":9,"dif":2,"q":"How many pillars does the Well-Architected Framework have?","o":["Four pillars","Five pillars","Six pillars","Seven pillars"],"a":2,"e":"The six pillars: Operational Excellence, Security, Reliability, Performance Efficiency, Cost Optimization, and Sustainability."},{"t":9,"dif":2,"q":"What does the Reliability pillar focus on?","o":["Achieving the lowest possible monthly cost","Recovering from failures and consistently meeting demand","Using the fastest instance types available","Reducing the carbon footprint of workloads"],"a":1,"e":"Reliability ensures workloads perform correctly, recover from failures automatically, and scale to meet demand."},{"t":9,"dif":2,"q":"What is a best practice for 'designing for failure'?","o":["Use the cheapest instance type in every case","Build redundancy, health checks, and automatic recovery into every layer","Deploy everything in a single AZ for simplicity","Avoid using managed services to maintain full control"],"a":1,"e":"Assume components will fail — architect with multi-AZ, health checks, auto-recovery, and graceful degradation from the start."},{"t":9,"dif":1,"q":"What is fault tolerance?","o":["The ability to tolerate user input errors gracefully","The system continues working correctly even when components fail","Automatic correction of billing calculation errors","The speed at which patches are applied to servers"],"a":1,"e":"Fault tolerance means redundancy is built in so a component failure doesn't cause a full system outage."},{"t":9,"dif":3,"q":"What does the Sustainability pillar focus on?","o":["Maximizing compute performance at all costs","Minimizing environmental impact of cloud workloads","Reducing the number of AWS services you use","Ensuring compliance with financial regulations"],"a":1,"e":"Sustainability focuses on reducing energy consumption, efficient resource usage, and minimizing the environmental footprint of your workloads."},{"t":9,"dif":2,"q":"What does AWS Trusted Advisor check for?","o":["Only security vulnerabilities in your EC2 instances","Best practices across cost, performance, security, fault tolerance, and limits","Only whether your S3 buckets are publicly accessible","Only whether you're using the latest AMI versions"],"a":1,"e":"Trusted Advisor analyzes your environment and provides actionable recommendations across five categories."},{"t":9,"dif":2,"q":"What is 'infrastructure as code' (IaC)?","o":["Writing application code that runs on EC2 instances","Defining and provisioning infrastructure using machine-readable templates","Manually configuring servers through the AWS Console","Using AI to automatically design your cloud architecture"],"a":1,"e":"IaC (e.g., CloudFormation, Terraform) lets you define infrastructure in code files that can be versioned, reviewed, and deployed repeatedly."},{"t":9,"dif":3,"q":"What does the Performance Efficiency pillar recommend?","o":["Always use the largest and most expensive instance types","Select the right resource types and sizes for your workload needs","Avoid using managed services to reduce vendor lock-in","Deploy all resources in a single Region for simplicity"],"a":1,"e":"Performance Efficiency means using compute resources efficiently — right-sizing, leveraging managed services, and experimenting with new options."},{"t":9,"dif":1,"q":"What does 'scalability' mean?","o":["Moving data between AWS Regions automatically","The ability to increase or decrease resources to match demand","Encrypting data both at rest and in transit","Deploying applications using containers only"],"a":1,"e":"Scalability means growing (scale out/up) or shrinking (scale in/down) resources based on demand — vertically or horizontally."},{"t":9,"dif":3,"q":"What is the AWS Well-Architected Tool?","o":["A service for building serverless applications quickly","A free tool to review workloads against the Well-Architected Framework pillars","A paid consulting service from AWS Solutions Architects","A command-line tool for deploying CloudFormation stacks"],"a":1,"e":"The Well-Architected Tool provides questions based on the six pillars, helping you identify risks and improvement opportunities."},{"t":9,"dif":2,"q":"What is the benefit of 'automating everything' in cloud architecture?","o":["It guarantees zero downtime for all applications","It reduces human error, speeds deployment, and enables repeatable processes","It eliminates the need for any security monitoring","It makes all AWS services completely free to use"],"a":1,"e":"Automation through IaC, CI/CD, and auto-recovery reduces human error, ensures consistency, and allows rapid, repeatable deployments."},{"t":9,"dif":2,"q":"What does the Operational Excellence pillar emphasize?","o":["Running systems at the absolute lowest cost possible","Running and improving systems to deliver business value continuously","Using only serverless services for all workloads","Ensuring all data is encrypted with customer keys"],"a":1,"e":"Operational Excellence focuses on running systems effectively, automating changes, responding to events, and continuously improving."},{"t":9,"dif":3,"q":"What is a disaster recovery (DR) strategy in cloud architecture?","o":["Deleting all backups to save on storage costs","A plan to restore systems and data after a major disruption","Running all workloads on a single instance for simplicity","Only using On-Demand instances with no reservations"],"a":1,"e":"DR strategies (backup/restore, pilot light, warm standby, multi-site active) define how quickly you can recover from a catastrophic event."},{"t":10,"dif":1,"q":"What does Amazon CloudWatch do
