nd example notebooks to accelerate ML development."},{"t":11,"dif":1,"q":"What does Amazon Comprehend Medical do?","o":["Provides language translation specifically for medical documents","Extracts medical information like conditions, medications, and dosages from text","Generates comprehensive medical reports from patient interview recordings","Analyzes medical images to detect diseases and abnormalities automatically"],"a":1,"e":"Comprehend Medical uses NLP to extract medical entities (conditions, medications, dosages, procedures) from unstructured clinical text."},{"t":11,"dif":2,"q":"What is Amazon CodeGuru?","o":["A code generation service that writes complete applications from descriptions","A service using ML to provide automated code reviews and performance recommendations","A version control system specifically designed for machine learning code","A visual programming environment for building Lambda functions graphically"],"a":1,"e":"CodeGuru Reviewer finds code defects and suggests improvements. CodeGuru Profiler identifies performance bottlenecks and expensive lines of code."},{"t":11,"dif":3,"q":"What are Agents for Amazon Bedrock?","o":["Human support agents available 24/7 to help with Bedrock configuration","Autonomous AI agents that can plan, execute multi-step tasks, and call APIs","Physical robots that run in AWS data centers to maintain server hardware","Automated scripts that deploy Bedrock models across multiple AWS Regions"],"a":1,"e":"Agents for Bedrock can autonomously break down tasks, determine actions, call APIs, and interact with knowledge bases to accomplish complex multi-step goals."},{"t":11,"dif":1,"q":"Which service converts text in images into machine-readable text?","o":["Amazon Comprehend","Amazon Polly","Amazon Textract","Amazon Translate"],"a":2,"e":"Textract extracts text, handwriting, tables, and form data from images and scanned documents — going beyond basic OCR."},{"t":11,"dif":2,"q":"What is Amazon Bedrock Knowledge Bases?","o":["A documentation repository for learning about Bedrock services","A feature for connecting foundation models to your enterprise data sources","A quiz and testing platform for evaluating model performance","A marketplace for buying and selling pre-trained machine learning models"],"a":1,"e":"Knowledge Bases let you connect foundation models to your data in S3, giving them context from your documents for more accurate, relevant responses."},{"t":9,"dif":2,"q":"Which pillar focuses on protecting data, systems, and assets through strong identity and encryption?","o":["Operational Excellence","Security","Reliability","Performance Efficiency"],"a":1,"e":"The Security pillar covers identity management, detection, infrastructure protection, data protection, and incident response."},{"t":9,"dif":2,"q":"Which pillar recommends performing operations as code and making frequent, small, reversible changes?","o":["Security","Cost Optimization","Operational Excellence","Sustainability"],"a":2,"e":"Operational Excellence emphasizes IaC, small incremental changes, anticipating failure, and continuously refining procedures."},{"t":9,"dif":3,"q":"Which pillar's design principles include 'stop guessing capacity' and 'scale horizontally'?","o":["Cost Optimization","Sustainability","Security","Reliability"],"a":3,"e":"Reliability recommends scaling horizontally for aggregate availability, automatically recovering, testing recovery, and using automation for change management."},{"t":9,"dif":2,"q":"Which pillar recommends using managed services to reduce operational burden?","o":["Security","Performance Efficiency","Sustainability","Cost Optimization"],"a":1,"e":"Performance Efficiency recommends leveraging managed services to eliminate undifferentiated heavy lifting, so you can focus on your product."},{"t":9,"dif":2,"q":"Which pillar focuses on understanding and controlling where money is spent?","o":["Reliability","Operational Excellence","Cost Optimization","Sustainability"],"a":2,"e":"Cost Optimization focuses on understanding spending, selecting right pricing models, matching supply to demand, and optimizing over time."},{"t":9,"dif":3,"q":"Which pillar was the most recent addition to the Well-Architected Framework?","o":["Security","Cost Optimization","Reliability","Sustainability"],"a":3,"e":"Sustainability was added as the sixth pillar, focusing on minimizing environmental impact through efficient resource usage."},{"t":9,"dif":3,"q":"A company wants to ensure their application automatically recovers from a database failure. Which pillar should they focus on?","o":["Cost Optimization","Sustainability","Performance Efficiency","Reliability"],"a":3,"e":"Reliability covers automatic recovery from failures, including multi-AZ deployments, health checks, and tested backup/restore procedures."},{"t":9,"dif":2,"q":"Which pillar recommends enabling traceability and applying security at all layers?","o":["Operational Excellence","Security","Reliability","Performance Efficiency"],"a":1,"e":"The Security pillar's design principles include implementing strong identity, enabling traceability, applying security at all layers, and automating best practices."},{"t":9,"dif":3,"q":"A team wants to reduce their cloud workload's carbon footprint. Which pillar addresses this?","o":["Cost Optimization","Performance Efficiency","Sustainability","Operational Excellence"],"a":2,"e":"Sustainability focuses on minimizing environmental impact through right-sizing, efficient hardware (Graviton), serverless, and reducing idle resources."},{"t":9,"dif":2,"q":"Which pillar recommends experimenting more easily and going global in minutes?","o":["Operational Excellence","Security","Cost Optimization","Performance Efficiency"],"a":3,"e":"Performance Efficiency recommends using advanced technologies, going global in minutes, using serverless, and experimenting more often."},{"t":12,"dif":1,"q":"How many pillars does the AWS Well-Architected Framework have?","o":["Four pillars","Five pillars","Six pillars","Eight pillars"],"a":2,"e":"The six pillars are: Operational Excellence, Security, Reliability, Performance Efficiency, Cost Optimization, and Sustainability."},{"t":12,"dif":1,"q":"Which pillar focuses on protecting data, systems, and assets?","o":["Operational Excellence","Security","Reliability","Cost Optimization"],"a":1,"e":"The Security pillar covers identity management, detection controls, infrastructure protection, data protection, and incident response."},{"t":12,"dif":1,"q":"Which pillar focuses on recovering from failures and meeting demand?","o":["Performance Efficiency","Cost Optimization","Security","Reliability"],"a":3,"e":"Reliability ensures workloads recover from failures automatically and scale to meet demand through redundancy and testing."},{"t":12,"dif":1,"q":"Which pillar focuses on avoiding unnecessary spending?","o":["Sustainability","Operational Excellence","Cost Optimization","Reliability"],"a":2,"e":"Cost Optimization focuses on understanding spending, right-sizing, using the right pricing models, and matching supply to demand."},{"t":12,"dif":1,"q":"Which pillar was the most recent addition to the framework?","o":["Security","Reliability","Cost Optimization","Sustainability"],"a":3,"e":"Sustainability was added as the sixth pillar, focusing on minimizing the environmental impact of cloud workloads."},{"t":12,"dif":1,"q":"Which pillar focuses on running and improving systems to deliver business value?","o":["Operational Excellence","Security","Reliability","Performance Efficiency"],"a":0,"e":"Operational Excellence emphasizes IaC, CI/CD, small reversible changes, anticipating failure, and learning from operational events."},{"t":12,"dif":2,"q":"Which pillar recommends performing operations as code?","o":["Security","Cost Optimization","Operational Excellence","Sustainability"],"a":2,"e":"Operational Excellence's design principles include performing operations as code, making frequent small changes, and anticipating failure."},{"t":12,"dif":2,"q":"Which pillar recommends enabling traceability and applying security at all layers?","o":["Operational Excellence","Security","Reliability","Performance Efficiency"],"a":1,"e":"Security design principles include strong identity, traceability (logging/auditing), security at all layers, and automating best practices."},{"t":12,"dif":2,"q":"Which pillar recommends scaling horizontally to increase availability?","o":["Cost Optimization","Sustainability","Reliability","Performance Efficiency"],"a":2,"e":"Reliability's design principles include scaling horizontally, automatically recovering, testing recovery, and stopping capacity guessing."},{"t":12,"dif":2,"q":"Which pillar recommends using serverless architectures and going global in minutes?","o":["Operational Excellence","Security","Cost Optimization","Performance Efficiency"],"a":3,"e":"Performance Efficiency recommends serverless, going global easily, experimenting often, and using the right resource types for each workload."},{"t":12,"dif":2,"q":"Which pillar recommends adopting a consumption model and measuring efficiency?","o":["Reliability","Cost Optimization","Security","Sustainability"],"a":1,"e":"Cost Optimization's principles include cloud financial management, consumption models, measuring efficiency, and stopping spending on undifferentiated lifting."},{"t":12,"dif":2,"q":"Which pillar recommends maximizing utilization and using efficient hardware?","o":["Performance Efficiency","Cost Optimization","Operational Excellence","Sustainability"],"a":3,"e":"Sustainability focuses on maximizing utilization, efficient hardware (Graviton), managed/serverless services, and reducing downstream waste."},{"t":12,"dif":2,"q":"A company wants their web app to automatically recover if a server fails. Which pillar?","o":["Cost Optimization","Sustainability","Reliability","Operational Excellence"],"a":2,"e":"Reliability covers automatic recovery from failure, multi-AZ deployment, health checks, and tested backup/restore procedures."},{"t":12,"dif":2,"q":"A team wants to automate their deployments and learn from operational failures. Which pillar?","o":["Security","Operational Excellence","Performance Efficiency","Cost Optimization"],"a":1,"e":"Operational Excellence focuses on IaC automation, CI/CD, observability, learning from failures, and continuously improving operations."},{"t":12,"dif":2,"q":"A company is paying for large instances that are mostly idle. Which pillar addresses this?","o":["Reliability","Security","Sustainability","Cost Optimization"],"a":3,"e":"Cost Optimization recommends right-sizing instances, using Savings Plans or Spot, shutting down idle resources, and monitoring spending."},{"t":12,"dif":3,"q":"Which pillar's design principles include 'keep people away from data'?","o":["Cost Optimization","Security","Operational Excellence","Reliability"],"a":1,"e":"Security recommends reducing direct access to data through automation and mechanisms — people shouldn't need to manually handle sensitive data."},{"t":12,"dif":3,"q":"Which pillar recommends 'mechanical sympathy' — understanding how services are consumed?","o":["Operational Excellence","Security","Performance Efficiency","Cost Optimization"],"a":2,"e":"Performance Efficiency's 'mechanical sympathy' means understanding how a service works and using it in the way that best fits your workload."},{"t":12,"dif":3,"q":"A startup wants to reduce their cloud workload's carbon footprint. Which pillar?","o":["Cost Optimization","Operational Excellence","Performance Efficiency","Sustainability"],"a":3,"e":"Sustainability focuses on right-sizing, Graviton instances, serverless to avoid idle waste, efficient storage, and Region selection for green energy."},{"t":12,"dif":3,"q":"Which is a design principle of the Reliability pillar?","o":["Implement strong identity foundation for all users","Stop spending money on undifferentiated heavy lifting","Test recovery procedures and manage change through automation","Perform operations as code and make small changes"],"a":2,"e":"Reliability's design principles include testing recovery, auto-recovering, scaling horizontally, stopping capacity guessing, and automating change."},{"t":12,"dif":3,"q":"What is the purpose of the AWS Well-Architected Tool?","o":["A CLI for deploying CloudFormation stacks to production","A free tool to review workloads against the six pillar best practices","A paid consulting service from AWS Solutions Architects","An automated service that fixes architectural issues in your account"],"a":1,"e":"The Well-Architected Tool lets you answer questions per pillar to identify risks and get improvement recommendations — free to use."},{"t":12,"dif":2,"q":"Which pillar focuses on selecting the right resource types and sizes for your workload?","o":["Operational Excellence","Security","Performance Efficiency","Sustainability"],"a":2,"e":"Performance Efficiency recommends right resource types/sizes, monitoring performance, leveraging managed services, and evolving with new technology."},{"t":12,"dif":3,"q":"A company needs to ensure all API calls are logged for compliance auditing. Which pillar?","o":["Reliability","Cost Optimization","Security","Sustainability"],"a":2,"e":"Security's 'enable traceability' principle means logging all actions (CloudTrail) for auditing, real-time alerting, and forensic investigation."},{"t":12,"dif":2,"q":"Which pillars are MOST concerned with Multi-AZ deployments?","o":["Security and Cost Optimization","Reliability and Performance Efficiency","Sustainability and Operational Excellence","Cost Optimization and Sustainability"],"a":1,"e":"Reliability uses Multi-AZ for fault tolerance and automatic recovery. Performance Efficiency uses it for distributing load and reducing latency."},{"t":12,"dif":1,"q":"What does the Well-Architected Framework help you do?","o":["Automatically deploy infrastructure with zero configuration","Evaluate your architecture against AWS best practices across six pillars","Calculate the exact monthly cost of your AWS resources","Migrate on-premises databases to AWS managed services"],"a":1,"e":"The Framework provides questions, best practices, and guidance across six pillars to help you build secure, efficient, reliable, and cost-effective systems."}];

const TOPICS=[{id:1,name:"Cloud Concepts Overview",short:"Cloud"},{id:2,name:"Cloud Economics & Billing",short:"Billing"},{id:3,name:"AWS Global Infrastructure",short:"Global"},{id:4,name:"AWS Cloud Security",short:"Security"},{id:5,name:"Networking & Content Delivery",short:"Network"},{id:6,name:"Compute",short:"Compute"},{id:7,name:"Storage",short:"Storage"},{id:8,name:"Databases",short:"DB"},{id:9,name:"Cloud Architecture",short:"Arch"},{id:10,name:"Auto Scaling & Monitoring",short:"Scale"},{id:11,name:"AWS AI Services",short:"AI"},{id:12,name:"Well-Architected Pillars",short:"Pillars"}];

const FC=[
{t:1,f:"Cloud Computing Definition",b:"On-demand delivery of IT resources over the internet with pay-as-you-go pricing.",u:"Any business moving from on-prem to cloud, startups avoiding hardware costs."},
{t:1,f:"IaaS vs PaaS vs SaaS",b:"IaaS = you manage OS up (EC2). PaaS = you manage code/data (Beanstalk). SaaS = you just use it (Gmail).",u:"IaaS for custom servers, PaaS for quick web app deploys, SaaS for email/CRM."},
{t:1,f:"6 R's of Migration",b:"Rehost, Replatform, Repurchase, Refactor, Retain, Retire.",u:"Planning any migration from on-prem to AWS — choose the right strategy per app."},
{t:1,f:"CapEx vs OpEx",b:"CapEx = upfront hardware. OpEx = pay-for-what-you-use. Cloud converts CapEx to OpEx.",u:"Justifying cloud migration to finance, improving cash flow."},
{t:1,f:"Elasticity vs Scalability",b:"Elasticity = automatic real-time scaling. Scalability = general ability to grow.",u:"E-commerce Black Friday (elasticity), growing startup (scalability)."},
{t:1,f:"Benefits of Cloud (6 Advantages)",b:"Trade CapEx for OpEx, economies of scale, stop guessing capacity, increase agility, stop spending on data centers, go global in minutes.",u:"Core arguments for any cloud migration business case."},
{t:1,f:"Public vs Private vs Hybrid Cloud",b:"Public = shared (AWS). Private = dedicated to one org. Hybrid = on-prem + cloud.",u:"Public for most workloads, private for strict compliance, hybrid for gradual migration."},
{t:1,f:"Cloud Agility",b:"Quickly provision resources, experiment, and iterate without long procurement.",u:"Startups launching MVPs, A/B testing features, rapid prototyping."},
{t:1,f:"AWS CAF",b:"6 perspectives: Business, People, Governance, Platform, Security, Operations.",u:"Enterprise cloud migration planning across all stakeholders."},
{t:1,f:"Loose Coupling",b:"Components interact via APIs/queues — fail, scale, and update independently.",u:"Microservices, event-driven apps, independent team deployments."},
{t:1,f:"Managed Services Benefit",b:"AWS handles patching, backups, scaling, HA so you focus on your code.",u:"Using RDS over self-managed DBs, Lambda over managing servers."},
{t:1,f:"Console vs CLI vs SDK",b:"Console = web GUI. CLI = terminal scripting. SDK = code integration.",u:"Console for learning, CLI for automation, SDK for app integration."},
{t:1,f:"Design for Failure",b:"Assume components fail. Build redundancy, health checks, auto-recovery.",u:"Any production workload — multi-AZ, health checks, auto-replacement."},
{t:1,f:"Economy of Scale",b:"AWS aggregates usage across customers, passing savings as lower prices.",u:"Every AWS customer benefits — 100+ price reductions since launch."},
{t:2,f:"EC2 Pricing Models",b:"On-Demand (no commit). Reserved/Savings Plans (up to 72% off). Spot (up to 90% off). Dedicated Hosts.",u:"On-Demand for dev, Reserved for prod, Spot for batch, Dedicated for licensing."},
{t:2,f:"Cost Explorer vs Budgets vs CUR",b:"Explorer = visualize costs. Budgets = spending alerts. CUR = detailed data to S3.",u:"Explorer for reviews, Budgets for prevention, CUR for custom dashboards."},
{t:2,f:"AWS Support Plans",b:"Basic (free). Developer ($29). Business (24/7, <1hr). Enterprise ($15K+, TAM, <15min).",u:"Basic for learning, Developer for startups, Business for prod, Enterprise for critical."},
{t:2,f:"AWS Free Tier",b:"Always Free (Lambda, DynamoDB). 12-Month Free (t2.micro, S3 5GB). Trials.",u:"Learning, prototyping, testing services before committing budget."},
{t:2,f:"Consolidated Billing",b:"Organizations combines accounts into one bill with volume discounts.",u:"Enterprises with multiple teams/environments across separate accounts."},
{t:2,f:"Data Transfer Pricing",b:"Data IN = free. Data OUT = charged per GB. Inter-AZ has small charge.",u:"Architecture design — know where transfer costs apply to optimize."},
{t:2,f:"Cost Allocation Tags",b:"Key-value metadata to categorize costs by project/team/environment.",u:"Chargeback to departments, tracking project costs, identifying waste."},
{t:2,f:"Reserved vs Savings Plans",b:"RIs lock to instance type/Region. Savings Plans flex across families/sizes.",u:"RIs for stable workloads, Savings Plans for flexibility."},
{t:2,f:"Spot Instances",b:"Up to 90% off using spare capacity. Can be reclaimed with 2-min warning.",u:"ML training, CI/CD builds, data processing, rendering."},
{t:2,f:"TCO (Total Cost of Ownership)",b:"Compare full on-prem cost (hardware, staff, facilities) vs cloud.",u:"Convincing leadership to migrate, calculating hidden on-prem costs."},
{t:2,f:"Trusted Advisor",b:"Best-practice checks: cost, performance, security, fault tolerance, limits.",u:"Finding idle resources, open security groups, approaching service limits."},
{t:2,f:"Billing Alarms",b:"CloudWatch alarms when estimated charges exceed your threshold.",u:"Preventing surprise bills for personal/student accounts."},
{t:3,f:"Region vs AZ vs Edge Location",b:"Region = geographic area. AZ = isolated data centers. Edge = CDN cache.",u:"Region for compliance, multi-AZ for HA, edge for fast delivery."},
{t:3,f:"Choosing a Region",b:"Consider: compliance, latency, service availability, pricing.",u:"Healthcare needing HIPAA Regions, gaming needing low player latency."},
{t:3,f:"Why Multi-AZ?",b:"Fault tolerance: if one AZ fails, app continues in others.",u:"RDS Multi-AZ, ELB across AZs, Auto Scaling across AZs."},
{t:3,f:"Edge Locations",b:"400+ CloudFront cache points worldwide for low-latency delivery.",u:"Streaming video, static websites, API acceleration."},
{t:3,f:"AWS Outposts",b:"AWS infra in YOUR data center for hybrid consistency.",u:"Low-latency on-prem needs, data residency, factory computing."},
{t:3,f:"Local Zones & Wavelength",b:"Local Zones = Region extensions for low latency. Wavelength = 5G edge.",u:"Gaming, AR/VR, connected vehicles, real-time mobile apps."},
{t:3,f:"Data Sovereignty",b:"Laws requiring data within borders. Solve by choosing the right Region.",u:"EU GDPR, Canadian PIPEDA, Australian data residency."},
{t:3,f:"AWS Global Network",b:"Private backbone connecting Regions. Traffic stays on AWS network.",u:"Multi-Region apps, cross-Region replication, global DB sync."},
{t:4,f:"Shared Responsibility Model",b:"AWS = security OF cloud (infra). Customer = security IN cloud (data, IAM, patching).",u:"Compliance audits, security planning — know who patches what."},
{t:4,f:"IAM: Users vs Roles vs Policies",b:"Users = permanent. Roles = temporary. Policies = JSON permissions.",u:"Users for people, Roles for EC2/Lambda, Policies on all of them."},
{t:4,f:"Least Privilege",b:"Grant only minimum permissions needed. Reduces blast radius.",u:"Every IAM setup — start with zero, add only what's needed."},
{t:4,f:"MFA",b:"Password + device code. Always enable on root account.",u:"Root protection, admin accounts, any high-privilege access."},
{t:4,f:"Shield vs WAF",b:"Shield = DDoS protection. WAF = HTTP firewall (SQL injection, XSS).",u:"Shield for all internet-facing apps, WAF for web request filtering."},
{t:4,f:"GuardDuty vs Inspector vs Macie",b:"GuardDuty = threat detection. Inspector = vuln scanning. Macie = S3 data discovery.",u:"GuardDuty ongoing, Inspector before deploys, Macie for compliance."},
{t:4,f:"CloudTrail",b:"Logs ALL API calls: who, what, when, from where.",u:"Security investigations, compliance audits, automated responses."},
{t:4,f:"Encryption at Rest vs in Transit",b:"Rest = data on disk (KMS). Transit = data over network (TLS/SSL).",u:"Enable on S3/EBS/RDS (rest), enforce HTTPS everywhere (transit)."},
{t:4,f:"KMS",b:"Create and manage encryption keys across AWS services.",u:"Encrypting S3, EBS, RDS, Secrets Manager, application data."},
{t:4,f:"SCPs",b:"Permission guardrails in Organizations. Override IAM if needed.",u:"Preventing dev accounts from launching expensive instances."},
{t:4,f:"Secrets Manager",b:"Store, retrieve, auto-rotate secrets (passwords, API keys).",u:"Database credential rotation, removing hardcoded secrets from code."},
{t:4,f:"AWS Artifact",b:"Download compliance reports: SOC, PCI DSS, ISO 27001, HIPAA.",u:"Providing compliance evidence to auditors."},
{t:5,f:"VPC Essentials",b:"Subnets, IGW, NAT GW, Route Tables, Security Groups, NACLs.",u:"Every AWS deployment — VPC is the network foundation."},
{t:5,f:"SGs vs NACLs",b:"SGs = stateful, instance-level, allow-only. NACLs = stateless, subnet-level, allow+deny.",u:"SGs for primary firewall, NACLs for extra subnet defense."},
{t:5,f:"Public vs Private Subnet",b:"Public = route to IGW. Private = NAT GW for outbound only.",u:"Web servers in public, databases in private."},
{t:5,f:"Route 53",b:"DNS, domain registration, health checks, routing policies.",u:"Domain management, latency routing, failover routing."},
{t:5,f:"CloudFront",b:"Global CDN at 400+ edge locations for low latency.",u:"Accelerating websites, streaming video, serving APIs."},
{t:5,f:"Direct Connect",b:"Dedicated private link from your data center to AWS.",u:"Hybrid architectures, large data transfers, compliance."},
{t:5,f:"ELB Types",b:"ALB (HTTP L7), NLB (TCP L4), GLB (appliances).",u:"ALB for web/microservices, NLB for gaming/IoT, GLB for firewalls."},
{t:5,f:"VPC Endpoint",b:"Private path from VPC to AWS services — no public internet.",u:"Keeping S3/DynamoDB traffic private, reducing transfer costs."},
{t:5,f:"Transit Gateway",b:"Central hub for multiple VPCs and on-prem networks.",u:"Enterprise multi-VPC, hub-and-spoke, 10+ VPC connectivity."},
{t:5,f:"VPC Flow Logs",b:"IP traffic metadata (source, dest, port, action) for monitoring.",u:"Troubleshooting connectivity, detecting suspicious traffic."},
{t:6,f:"Lambda vs EC2 vs Fargate",b:"Lambda = serverless functions. EC2 = full VMs. Fargate = serverless containers.",u:"Lambda for APIs/events, EC2 for full control, Fargate for microservices."},
{t:6,f:"EC2 Instance Families",b:"T/M = general. C = compute. R/X = memory. I/D = storage. P/G = GPU.",u:"T3 web servers, C5 encoding, R5 in-memory DBs, P3 deep learning."},
{t:6,f:"EC2 AMI",b:"Template with OS + software for launching instances.",u:"Golden images, consistent deployments, Marketplace appliances."},
{t:6,f:"Instance Store vs EBS",b:"Instance store = ephemeral. EBS = persistent.",u:"Instance store for temp caches, EBS for databases/boot volumes."},
{t:6,f:"Elastic Beanstalk",b:"PaaS: upload code, handles provisioning/scaling/monitoring.",u:"Quick deploy of web apps without managing infrastructure."},
{t:6,f:"ECS vs EKS",b:"ECS = AWS-native Docker. EKS = managed Kubernetes.",u:"ECS for AWS-first, EKS for existing K8s teams."},
{t:6,f:"Lambda Limits",b:"15 min max. Python, Node, Java, Go, .NET, Ruby, custom runtimes.",u:"API backends, S3 processing, scheduled tasks, file transforms."},
{t:6,f:"Graviton",b:"ARM processors by AWS. Up to 40% better price-performance.",u:"Web servers, containers, Java apps — anything benefiting from cost savings."},
{t:6,f:"EC2 User Data",b:"Script that runs on first boot for automated setup.",u:"Installing Apache, pulling code from Git, configuring agents."},
{t:7,f:"S3 vs EBS vs EFS",b:"S3 = object (HTTP). EBS = block (single EC2). EFS = shared NFS.",u:"S3 for files/lakes, EBS for DB volumes, EFS for shared content."},
{t:7,f:"S3 Storage Classes",b:"Standard > Intelligent-Tiering > IA > Glacier > Deep Archive.",u:"Standard for active, IA for monthly access, Glacier for archives."},
{t:7,f:"S3 Durability",b:"99.999999999% (11 nines).",u:"Any data you can't lose — backups, records, media, data lakes."},
{t:7,f:"S3 Versioning",b:"Keeps every version. Protects against accidental deletes.",u:"Critical documents, compliance change history, rollback ability."},
{t:7,f:"S3 Lifecycle Policies",b:"Auto-transition or delete objects based on age.",u:"Archive logs after 30 days, delete temp files after 7 days."},
{t:7,f:"S3 Object Lock",b:"WORM — prevents deletion for a retention period.",u:"Financial records, healthcare HIPAA, legal evidence holds."},
{t:7,f:"EBS Snapshots",b:"Point-in-time backups stored in S3. Incremental.",u:"DB backups before maintenance, creating AMIs, DR."},
{t:7,f:"Snow Family",b:"Physical devices: Snowcone (8TB), Snowball (80TB), Snowmobile (100PB).",u:"Migrating petabytes, edge computing in remote locations."},
{t:7,f:"Storage Gateway",b:"Hybrid: File GW (NFS/SMB>S3), Volume GW, Tape GW.",u:"Backing up on-prem to S3, extending storage to cloud."},
{t:8,f:"RDS vs DynamoDB",b:"RDS = relational (SQL, joins). DynamoDB = NoSQL (key-value, ms latency).",u:"RDS for e-commerce queries, DynamoDB for gaming/IoT/sessions."},
{t:8,f:"RDS Multi-AZ vs Read Replicas",b:"Multi-AZ = HA failover. Read Replicas = read scaling.",u:"Multi-AZ for uptime, Read Replicas for reporting."},
{t:8,f:"Aurora",b:"MySQL/PostgreSQL-compatible, 5x faster, 3-AZ replication, serverless option.",u:"Enterprise apps, SaaS, gaming backends, financial systems."},
{t:8,f:"DynamoDB Features",b:"Serverless, ms latency, auto-scale, Global Tables, DAX cache.",u:"Mobile backends, IoT, gaming, ad tech, shopping carts."},
{t:8,f:"Redshift",b:"Cloud data warehouse. Columnar + parallel queries on petabytes.",u:"BI dashboards, financial reporting, data lake analytics."},
{t:8,f:"ElastiCache",b:"In-memory cache (Redis/Memcached). Sub-ms reads.",u:"Session stores, leaderboards, caching DB queries."},
{t:8,f:"SQL vs NoSQL",b:"SQL = fixed schema, joins. NoSQL = flexible schema, specific access patterns.",u:"SQL for complex relationships, NoSQL for high-scale simple lookups."},
{t:9,f:"High Availability",b:"Minimal downtime via redundancy across AZs.",u:"Any production app — multi-AZ with load balancers."},
{t:9,f:"Fault Tolerance",b:"System works even when components fail.",u:"Mission-critical: financial trading, healthcare systems."},
{t:9,f:"RPO vs RTO",b:"RPO = max data loss. RTO = max downtime.",u:"RPO=1hr means hourly backups, RTO=15min means warm standby."},
{t:9,f:"DR Strategies",b:"Backup/Restore > Pilot Light > Warm Standby > Active-Active.",u:"Most apps use Pilot Light or Warm Standby based on budget."},
{t:9,f:"Infrastructure as Code",b:"CloudFormation/Terraform templates. Version-controlled, repeatable.",u:"CI/CD pipelines, environment replication, auditable changes."},
{t:9,f:"Right-Sizing",b:"Match instance types to actual workload needs.",u:"Cost reviews — analyze CloudWatch to downsize over-provisioned."},
{t:9,f:"Cattle vs Pets",b:"Pets = nurse back to health. Cattle = terminate and replace.",u:"Auto Scaling groups, immutable deployments, containers."},
{t:10,f:"CloudWatch vs CloudTrail vs Config",b:"CloudWatch = metrics/alarms. CloudTrail = API audit. Config = config tracking.",u:"CloudWatch for ops, CloudTrail for security, Config for compliance."},
{t:10,f:"Auto Scaling Group",b:"EC2 collection with min/max/desired capacity. Auto-maintains count.",u:"Web server fleets, app tiers, automatic capacity management."},
{t:10,f:"Scaling Policies",b:"Target Tracking, Step, Scheduled, Predictive (ML).",u:"Target for steady CPU, scheduled for known patterns, predictive for spikes."},
{t:10,f:"CloudWatch Alarms",b:"Trigger Auto Scaling, SNS, Lambda on metric thresholds.",u:"Alert on high CPU, trigger scale-out, notify on-call teams."},
{t:10,f:"CloudFormation",b:"IaC with YAML/JSON. Stacks group resources.",u:"Automated provisioning, CI/CD infra, DR replication."},
{t:10,f:"EventBridge",b:"Serverless event bus routing events to Lambda/SQS/etc.",u:"Reacting to S3 uploads, EC2 changes, SaaS webhooks."},
{t:10,f:"X-Ray",b:"Trace requests through distributed apps. Find bottlenecks.",u:"Debugging slow microservice calls, identifying failing services."},
{t:10,f:"Systems Manager",b:"Patch management, parameter store, run commands, automation.",u:"Automated patching, storing config strings, fleet management."},
{t:11,f:"AI Services Overview",b:"SageMaker, Rekognition, Transcribe, Polly, Comprehend, Lex, Bedrock.",u:"Adding AI to any app — pre-trained APIs or custom models."},
{t:11,f:"Bedrock vs SageMaker",b:"Bedrock = pre-built foundation models. SageMaker = build custom models.",u:"Bedrock for chatbots/gen AI, SageMaker for custom fraud/forecasting."},
{t:11,f:"Textract vs Comprehend",b:"Textract = extract from documents. Comprehend = analyze text for insights.",u:"Textract for invoices/forms, Comprehend for feedback analysis."},
{t:11,f:"Transcribe vs Polly",b:"Transcribe = speech>text. Polly = text>speech.",u:"Transcribe for meeting notes, Polly for accessibility/voice apps."},
{t:11,f:"Amazon Lex",b:"Conversational AI chatbots. Same tech as Alexa.",u:"Customer service bots, IT help desks, appointment scheduling."},
{t:11,f:"Amazon Rekognition",b:"Image/video: objects, faces, text, activities.",u:"Content moderation, face verification, PPE detection, media tagging."},
{t:11,f:"Amazon Bedrock",b:"Foundation models (Anthropic, Meta, etc.) via API for gen AI.",u:"Chatbots, summarization, content generation, RAG with company data."},
{t:11,f:"Amazon Personalize",b:"Real-time recommendations. Same tech as Amazon.com.",u:"Product suggestions, content recommendations, personalized marketing."},
{t:11,f:"Pre-Trained vs Custom ML",b:"Pre-trained = API calls, no expertise. Custom = train on your data.",u:"Pre-trained for common tasks, custom for unique business problems."},
{t:12,f:"The 6 Pillars",b:"Operational Excellence, Security, Reliability, Performance Efficiency, Cost Optimization, Sustainability.",u:"Architecture reviews, exam prep, framework discussions."},
{t:12,f:"Operational Excellence",b:"IaC, CI/CD, small changes, anticipate failure, learn from failures.",u:"CloudFormation deploys, CI/CD pipelines, runbooks, post-mortems."},
{t:12,f:"Security",b:"Strong identity, traceability, all layers, automate, encrypt everything.",u:"IAM least privilege, CloudTrail auditing, KMS encryption."},
{t:12,f:"Reliability",b:"Auto-recover, test recovery, scale horizontally, stop guessing capacity.",u:"Multi-AZ, Auto Scaling, health checks, DR drills."},
{t:12,f:"Performance Efficiency",b:"Right resources, managed services, serverless, experiment, go global.",u:"Right-sizing, Graviton, caching, Lambda for variable workloads."},
{t:12,f:"Cost Optimization",b:"Understand spending, right pricing, match supply/demand.",u:"Savings Plans, Spot, right-sizing, tagging, idle resource cleanup."},
{t:12,f:"Sustainability",b:"Maximize utilization, efficient hardware, managed/serverless.",u:"Graviton, serverless to avoid idle, efficient storage, green Regions."},
{t:12,f:"Scenario: Multi-AZ + auto-recovery",b:"Reliability pillar.",u:"HA architectures with Multi-AZ RDS, cross-AZ Auto Scaling."},
{t:12,f:"Scenario: Encrypt + least privilege",b:"Security pillar.",u:"HIPAA/PCI compliance, security hardening, audit prep."},
{t:12,f:"Scenario: Stop wasting on idle resources",b:"Cost Optimization pillar.",u:"Monthly cost reviews, zombie resource cleanup, auto-shutdown dev."},
{t:12,f:"Scenario: Reduce carbon footprint",b:"Sustainability pillar.",u:"Green IT initiatives, ESG reporting, reducing waste."},
{t:12,f:"Well-Architected Review",b:"Use the WA Tool: answer pillar questions, find HRIs, get improvement plans. Free.",u:"Quarterly architecture reviews, pre-launch checks, continuous improvement."},
];

// ════════════════════════════════════════
// AUTH & STORAGE
// ════════════════════════════════════════
const DL={1:'Easy',2:'Medium',3:'Hard'},DC={1:'easy',2:'medium',3:'hard'};
let currentUser=null;
let authMode='login'; // 'login' or 'signup'
let S={score:0,tc:{},ta:{},cfgCount:10,cfgDiff:'all',cfgTopic:'all',cfgTimer:0,qzQ:[],qzI:0,qzR:[],qzAns:false,qzSel:-1,fcT:null,fcI:0,fcF:false};

function initState(){
  S={score:0,tc:{},ta:{},cfgCount:10,cfgDiff:'all',cfgTopic:'all',cfgTimer:0,qzQ:[],qzI:0,qzR:[],qzAns:false,qzSel:-1,fcT:null,fcI:0,fcF:false};
  TOPICS.forEach(t=>{S.tc[t.id]=0;S.ta[t.id]=0;});
}

function loadUserData(){
  initState();
  try{
    const raw=localStorage.getItem('aws_user_'+currentUser);
    if(raw){const d=JSON.parse(raw);S.score=d.s||0;if(d.c)S.tc=d.c;if(d.a)S.ta=d.a;}
  }catch(e){}
}

function saveUserData(){
  try{
    localStorage.setItem('aws_user_'+currentUser,JSON.stringify({s:S.score,c:S.tc,a:S.ta}));
  }catch(e){console.error('Save error:',e);}
}

function checkAuth(user,pass){
  try{
    const raw=localStorage.getItem('aws_auth_'+user.toLowerCase());
    if(raw){const d=JSON.parse(raw);return d.p===pass;}
    return null;
  }catch(e){return null;}
}

function createAccount(user,pass){
  try{
    const existing=localStorage.getItem('aws_auth_'+user.toLowerCase());
    if(existing)return false;
    localStorage.setItem('aws_auth_'+user.toLowerCase(),JSON.stringify({p:pass,created:Date.now()}));
    return true;
  }catch(e){return false;}
}

function toggleAuthMode(){
  authMode=authMode==='login'?'signup':'login';
  document.getElementById('authSub').textContent=authMode==='login'?'Sign in to track your progress':'Create an account to get started';
  document.getElementById('authBtn').textContent=authMode==='login'?'Sign In':'Create Account';
  document.getElementById('authToggle').innerHTML=authMode==='login'?'No account? <a onclick="toggleAuthMode()">Create one</a>':'Already have one? <a onclick="toggleAuthMode()">Sign in</a>';
  document.getElementById('authError').textContent='';
  document.getElementById('authSuccess').textContent='';
}

function handleAuth(){
  const user=document.getElementById('authUser').value.trim();
  const pass=document.getElementById('authPass').value;
  const errEl=document.getElementById('authError');
  const succEl=document.getElementById('authSuccess');
  errEl.textContent='';succEl.textContent='';
  if(!user||user.length<2){errEl.textContent='Username must be at least 2 characters';return;}
  if(!pass||pass.length<3){errEl.textContent='Password must be at least 3 characters';return;}
  if(/[^a-zA-Z0-9_]/.test(user)){errEl.textContent='Username: letters, numbers, and underscores only';return;}

  if(authMode==='signup'){
    const ok=createAccount(user,pass);
    if(!ok){errEl.textContent='Username already taken — try another';return;}
  } else {
    const result=checkAuth(user,pass);
    if(result===null){errEl.textContent='Account not found — check username or create one';return;}
    if(result===false){errEl.textContent='Incorrect password';return;}
  }

  currentUser=user;
  loadUserData();
  document.getElementById('authScreen').style.display='none';
  document.getElementById('appWrap').style.display='block';
  document.getElementById('userName').textContent=user;
  document.getElementById('userAvatar').textContent=user[0].toUpperCase();
  document.getElementById('totalScore').textContent=S.score;
  renderDash();
}

function logout(){
  if(!confirm('Sign out of '+currentUser+'?'))return;
  currentUser=null;
  document.getElementById('appWrap').style.display='none';
  document.getElementById('authScreen').style.display='flex';
  document.getElementById('authUser').value='';
  document.getElementById('authPass').value='';
  document.getElementById('authError').textContent='';
  document.getElementById('authSuccess').textContent='';
  authMode='login';
  toggleAuthMode();toggleAuthMode(); // reset to login state
}

// Enter key support for auth
document.addEventListener('keydown',e=>{
  if(e.key==='Enter'&&document.getElementById('authScreen').style.display!=='none')handleAuth();
});

// ════════════════════════════════════════
// NAVIGATION
// ════════════════════════════════════════
function showView(v){
  if(timerInterval)clearInterval(timerInterval);
  document.querySelectorAll('.view').forEach(x=>x.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('view-'+v).classList.add('active');
  document.querySelectorAll('.nav-tab').forEach(t=>{
    const txt=t.textContent.toLowerCase();
    if((v==='dashboard'&&txt==='dashboard')||(v==='quiz'&&txt==='quiz')||(v==='flashcards'&&txt==='cards')||(v==='reference'&&txt==='reference'))t.classList.add('active');
  });
  ({dashboard:renderDash,quiz:renderQCfg,flashcards:renderFC,reference:renderRef})[v]?.();
}

// ════════════════════════════════════════
// DASHBOARD
// ════════════════════════════════════════
function renderDash(){
  const tot=Object.values(S.ta).reduce((a,b)=>a+b,0),cor=Object.values(S.tc).reduce((a,b)=>a+b,0),pct=tot?Math.round(cor/tot*100):0;
  document.getElementById('totalScore').textContent=S.score;
  document.getElementById('statsRow').innerHTML=`<div class="stat-card"><div class="stat-num">${tot}</div><div class="stat-label">Attempted</div></div><div class="stat-card"><div class="stat-num">${cor}</div><div class="stat-label">Correct</div></div><div class="stat-card"><div class="stat-num">${pct}%</div><div class="stat-label">Accuracy</div></div><div class="stat-card"><div class="stat-num">${Q.length}</div><div class="stat-label">Question Bank</div></div>`;
  document.getElementById('topicGrid').innerHTML=TOPICS.map(t=>{const a=S.ta[t.id],c=S.tc[t.id],p=a?Math.round(c/a*100):0;return`<div class="topic-card" onclick="showView('quiz')"><div class="tc-num">${t.id}</div><h3>${t.name}</h3><div class="tc-stats">${Q.filter(q=>q.t===t.id).length} Qs · ${a} done</div><div class="topic-bar"><div class="topic-bar-fill" style="width:${p}%"></div></div><div class="topic-pct">${p}%</div></div>`;}).join('');
}

// ════════════════════════════════════════
// QUIZ CONFIG
// ════════════════════════════════════════
function renderQCfg(){
  document.getElementById('quizConfig').style.display='block';document.getElementById('quizArea').style.display='none';document.getElementById('resultsArea').style.display='none';
  document.getElementById('topicChips').innerHTML=`<div class="topic-chip ${S.cfgTopic==='all'?'active':''}" onclick="setTopic('all',this)">All Topics</div>`+TOPICS.map(t=>`<div class="topic-chip ${S.cfgTopic===t.id?'active':''}" onclick="setTopic(${t.id},this)">${t.name}</div>`).join('');
  updInfo();
}
function setToggle(type,el){el.parentElement.querySelectorAll('.toggle-btn').forEach(b=>b.classList.remove('active'));el.classList.add('active');const v=el.dataset.val;if(type==='count')S.cfgCount=parseInt(v);else if(type==='diff')S.cfgDiff=v==='all'?'all':parseInt(v);else if(type==='timer')S.cfgTimer=parseInt(v);updInfo();}
function setTopic(id,el){S.cfgTopic=id;document.querySelectorAll('.topic-chip').forEach(c=>c.classList.remove('active'));el.classList.add('active');updInfo();}
function getPool(){let p=[...Q];if(S.cfgTopic!=='all')p=p.filter(q=>q.t===S.cfgTopic);if(S.cfgDiff!=='all')p=p.filter(q=>q.dif===S.cfgDiff);return p;}
function updInfo(){
  const p=getPool(),dt=S.cfgDiff==='all'?'All difficulties':DL[S.cfgDiff],tt=S.cfgTopic==='all'?'All topics':TOPICS.find(t=>t.id===S.cfgTopic).name,n=Math.min(S.cfgCount,p.length);
  const tm=S.cfgTimer?S.cfgTimer+'s timer':'No timer';
  document.getElementById('launchInfo').textContent=`${n} Qs · ${dt} · ${tm}`;
  document.getElementById('poolWarning').textContent=p.length<S.cfgCount?`Only ${p.length} questions match — using all ${p.length}`:'';
}

function launchQuiz(){let p=getPool();for(let i=p.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[p[i],p[j]]=[p[j],p[i]];}const n=Math.min(S.cfgCount,p.length);if(!n)return;S.qzQ=p.slice(0,n);S.qzI=0;S.qzR=[];S.qzAns=false;S.qzSel=-1;document.getElementById('quizConfig').style.display='none';document.getElementById('quizArea').style.display='block';document.getElementById('resultsArea').style.display='none';renderQuestion();}

// ════════════════════════════════════════
// TIMER
// ════════════════════════════════════════
let timerInterval=null;
let timerRemaining=0;

function startTimer(){
  if(!S.cfgTimer)return;
  timerRemaining=S.cfgTimer;
  updateTimerDisplay();
  timerInterval=setInterval(()=>{
    timerRemaining-=0.1;
    if(timerRemaining<=0){
      timerRemaining=0;
      clearInterval(timerInterval);timerInterval=null;
      timeoutAnswer();
    }
    updateTimerDisplay();
  },100);
}

function stopTimer(){if(timerInterval){clearInterval(timerInterval);timerInterval=null;}}

function updateTimerDisplay(){
  const bar=document.getElementById('timerBarFill');
  const txt=document.getElementById('timerText');
  if(!bar||!txt)return;
  const pct=(timerRemaining/S.cfgTimer)*100;
  bar.style.width=pct+'%';
  const secs=Math.ceil(timerRemaining);
  txt.textContent=secs+'s';
  bar.className='timer-bar-fill'+(pct<25?' danger':pct<50?' warn':'');
  txt.className='timer-text'+(pct<25?' danger':'');
}

function timeoutAnswer(){
  if(S.qzAns)return;
  S.qzAns=true;
  S.qzR.push(false); // timeout = wrong
  const q=S.qzQ[S.qzI];
  S.ta[q.t]++;
  saveUserData();
  document.querySelectorAll('.quiz-option').forEach(o=>o.classList.add('locked'));
  document.getElementById('opt-'+q.a).classList.add('timeout-answer');
  const cb=document.getElementById('confirmBtn');if(cb)cb.style.display='none';
  document.getElementById('quizExplain').innerHTML=`<div class="quiz-explain"><strong>⏱️ Time's up!</strong> ${q.e}</div>`;
  document.getElementById('nextBtn').style.display='inline-flex';
  document.querySelector('.quiz-progress').innerHTML=dots();
}

// ════════════════════════════════════════
// QUIZ RUNTIME
// ════════════════════════════════════════
function dots(){return S.qzQ.map((_,i)=>{let c='quiz-dot';if(i<S.qzR.length){if(S.qzR[i]===true)c+=' correct';else if(S.qzR[i]==='timeout')c+=' timeout';else c+=' wrong';}else if(i===S.qzI)c+=' current';return`<div class="${c}"></div>`;}).join('');}

function renderQuestion(){
  stopTimer();
  const q=S.qzQ[S.qzI],tn=TOPICS.find(t=>t.id===q.t).name,L=['A','B','C','D'];
  const timerHTML=S.cfgTimer?`<div class="timer-text" id="timerText">${S.cfgTimer}s</div><div class="timer-bar"><div class="timer-bar-fill" id="timerBarFill" style="width:100%"></div></div>`:'';
  document.getElementById('quizArea').innerHTML=`<div class="quiz-header"><div class="quiz-progress">${dots()}</div><div class="quiz-counter">${S.qzI+1} / ${S.qzQ.length}</div></div>${timerHTML}<div class="quiz-tags"><span class="quiz-tag quiz-tag-topic">${tn}</span><span class="quiz-tag quiz-tag-${DC[q.dif]}">${DL[q.dif]}</span></div><div class="quiz-question">${q.q}</div><div class="quiz-options">${q.o.map((o,i)=>`<button class="quiz-option" onclick="pickOpt(${i})" id="opt-${i}"><span class="opt-letter">${L[i]}</span><span>${o}</span></button>`).join('')}</div><button class="btn-confirm" id="confirmBtn" onclick="confirmAnswer()">Submit Answer</button><div id="quizExplain" style="margin-top:16px;"></div><div class="btn-row" style="margin-top:12px;"><button class="btn btn-primary" id="nextBtn" style="display:none;" onclick="nextQ()">${S.qzI<S.qzQ.length-1?'Next Question →':'See Results →'}</button></div>`;
  S.qzAns=false;S.qzSel=-1;
  if(S.cfgTimer)startTimer();
}

function pickOpt(i){if(S.qzAns)return;S.qzSel=i;document.querySelectorAll('.quiz-option').forEach((o,idx)=>o.classList.toggle('selected',idx===i));document.getElementById('confirmBtn').classList.add('ready');}

function confirmAnswer(){
  if(S.qzSel<0||S.qzAns)return;
  stopTimer();
  S.qzAns=true;const q=S.qzQ[S.qzI],ok=S.qzSel===q.a;S.qzR.push(ok);S.ta[q.t]++;
  if(ok){S.tc[q.t]++;S.score+=q.dif===1?5:q.dif===2?10:15;}
  document.getElementById('totalScore').textContent=S.score;
  saveUserData();
  document.querySelectorAll('.quiz-option').forEach(o=>o.classList.add('locked'));
  document.getElementById('opt-'+q.a).classList.add('correct-answer');
  if(!ok)document.getElementById('opt-'+S.qzSel).classList.add('wrong-answer');
  document.getElementById('confirmBtn').style.display='none';
  document.getElementById('quizExplain').innerHTML=`<div class="quiz-explain"><strong>${ok?'✅ Correct!':'❌ Incorrect.'}</strong> ${q.e}</div>`;
  document.getElementById('nextBtn').style.display='inline-flex';
  document.querySelector('.quiz-progress').innerHTML=dots();
}

function nextQ(){S.qzI++;S.qzAns=false;S.qzSel=-1;if(S.qzI>=S.qzQ.length){showRes();return;}renderQuestion();}

function showRes(){
  stopTimer();
  document.getElementById('quizArea').style.display='none';document.getElementById('resultsArea').style.display='block';
  const c=S.qzR.filter(x=>x===true).length,t=S.qzR.length,p=Math.round(c/t*100),pass=p>=70;
  let db={};S.qzQ.forEach((q,i)=>{if(!db[q.t])db[q.t]={c:0,t:0};db[q.t].t++;if(S.qzR[i]===true)db[q.t].c++;});
  document.getElementById('resultsArea').innerHTML=`<h2 style="font-size:20px;color:var(--text-muted);margin-bottom:4px;">Quiz Complete</h2><div class="results-score" style="color:${pass?'var(--green)':'var(--red)'}">${p}%</div><div class="results-label">${c} of ${t} correct · ${pass?'🎉 Passing score!':'Keep studying — you need 70%'}</div><div class="results-breakdown">${Object.entries(db).map(([d,v])=>`<div class="rb-card"><div class="rb-num" style="color:${v.c/v.t>=0.7?'var(--green)':'var(--red)'}">${Math.round(v.c/v.t*100)}%</div><div class="rb-label">${TOPICS.find(x=>x.id==d).name}</div></div>`).join('')}</div><div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;"><button class="btn btn-primary" onclick="launchQuiz()">🔄 Retry</button><button class="btn btn-secondary" onclick="showView('quiz')">⚙️ New Quiz</button><button class="btn btn-secondary" onclick="showView('dashboard')">📊 Dashboard</button></div>`;
}

// ════════════════════════════════════════
// FLASHCARDS
// ════════════════════════════════════════
function renderFC(){
  const cs='padding:7px 12px;border-radius:8px;font-size:12px;font-weight:600;background:var(--surface-2);border:1px solid var(--border);cursor:pointer;color:var(--text-muted);transition:all 0.2s;white-space:nowrap;',as='border-color:var(--accent);color:var(--accent);background:var(--accent-glow);';
  document.getElementById('fcTopicChips').innerHTML=`<div style="${cs}${S.fcT===null?as:''}" onclick="setFcT(null)">All</div>`+TOPICS.map(t=>`<div style="${cs}${S.fcT===t.id?as:''}" onclick="setFcT(${t.id})">${t.short}</div>`).join('');
  renderCard();
}
function setFcT(id){S.fcT=id;S.fcI=0;S.fcF=false;renderFC();}
function fcCards(){return S.fcT?FC.filter(c=>c.t===S.fcT):FC;}
function renderCard(){const cards=fcCards();if(!cards.length)return;const c=cards[S.fcI%cards.length];document.getElementById('fcFront').textContent=c.f;document.getElementById('fcBack').innerHTML=c.b+(c.u?'<div style="margin-top:12px;padding-top:10px;border-top:1px solid var(--border);font-size:14px;color:var(--accent);"><strong>Use cases:</strong> <span style="color:var(--text-muted);">'+c.u+'</span></div>':'');document.getElementById('fcCount').textContent=`${(S.fcI%cards.length)+1} / ${cards.length}`;const el=document.getElementById('flashcard');if(S.fcF)el.classList.add('flipped');else el.classList.remove('flipped');document.getElementById('fcTopicLabel').textContent=S.fcT?TOPICS.find(t=>t.id===S.fcT).name:'All Topics';}
function flipCard(){S.fcF=!S.fcF;document.getElementById('flashcard').classList.toggle('flipped');}
function nextCard(){const c=fcCards();S.fcI=(S.fcI+1)%c.length;S.fcF=false;renderCard();}
function prevCard(){const c=fcCards();S.fcI=(S.fcI-1+c.length)%c.length;S.fcF=false;renderCard();}

// ════════════════════════════════════════
// REFERENCE
// ════════════════════════════════════════
function renderRef(){
  const search=(document.getElementById('refSearch')?.value||'').toLowerCase().trim();
  let html='';
  Object.entries(SERVICES).forEach(([cat,svcs])=>{
    const catMatch=search&&cat.toLowerCase().includes(search);
    const filtered=search?(catMatch?svcs:svcs.filter(s=>s.n.toLowerCase().includes(search)||s.d.toLowerCase().includes(search)||(s.u&&s.u.toLowerCase().includes(search)))):svcs;
    if(filtered.length===0)return;
    html+=`<div class="ref-section"><h2>${cat}</h2><div class="ref-grid">${filtered.map(s=>`<div class="ref-card"><h4>${s.n}</h4><p>${s.d}</p>${s.u?`<p style="margin-top:6px;color:var(--accent);font-size:12px;"><strong>Use cases:</strong> <span style="color:var(--text-muted);">${s.u}</span></p>`:''}</div>`).join('')}</div></div>`;
  });
  if(!html)html='<div style="text-align:center;color:var(--text-muted);padding:40px;">No services match your search.</div>';
  document.getElementById('refContent').innerHTML=html;
}

  document.getElementById('loadingOverlay').style.display='none';
