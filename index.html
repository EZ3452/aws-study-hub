?","o":["Records all API calls for auditing purposes","Monitors resources in real time with metrics, logs, and alarms","Manages user authentication and access control","Delivers content via a global network of edge locations"],"a":1,"e":"CloudWatch collects metrics, aggregates logs, sets alarms, and can trigger automated actions based on defined thresholds."},{"t":10,"dif":1,"q":"What does AWS Auto Scaling do?","o":["Distributes incoming traffic evenly across multiple targets","Automatically adjusts resource capacity to match demand and minimize cost","Encrypts data stored on EBS volumes and S3 buckets","Migrates on-premises databases to cloud-managed equivalents"],"a":1,"e":"Auto Scaling adds or removes instances based on demand, maintaining the performance you define while minimizing cost."},{"t":10,"dif":2,"q":"What defines an Auto Scaling Group?","o":["A group of S3 buckets with shared lifecycle policies","A collection of instances with min, max, and desired capacity settings","A set of IAM users with identical permissions","A cluster of databases sharing the same connection pool"],"a":1,"e":"An ASG defines the minimum, maximum, and desired number of instances and automatically maintains the desired count."},{"t":10,"dif":2,"q":"What typically triggers Auto Scaling to add instances?","o":["A manual approval process by an administrator","CloudWatch alarms based on metrics like CPU or request count","A scheduled calendar event created annually","An AWS billing threshold being exceeded"],"a":1,"e":"Scaling policies use CloudWatch metrics — when CPU, network traffic, or custom metrics cross a threshold, instances are added or removed."},{"t":10,"dif":2,"q":"What is the difference between horizontal and vertical scaling?","o":["Horizontal is more expensive; vertical is always free","Horizontal adds more instances; vertical increases the size of one instance","Horizontal is only for databases; vertical is only for compute","Horizontal requires reserved instances; vertical uses spot only"],"a":1,"e":"Horizontal scaling (scale out) adds more instances. Vertical scaling (scale up) increases CPU/RAM on a single instance."},{"t":10,"dif":3,"q":"What is Amazon EventBridge?","o":["A physical bridge connecting AWS data centers","A serverless event bus for routing events between applications and services","A network gateway connecting VPCs in different Regions","A monitoring dashboard for tracking event counts"],"a":1,"e":"EventBridge routes events from your apps, SaaS providers, and AWS services to targets like Lambda, SQS, and Step Functions."},{"t":10,"dif":2,"q":"What can CloudWatch Alarms trigger?","o":["Only email notifications to the account owner","Scaling actions, SNS notifications, Lambda functions, and more","Only dashboard color changes for visual indicators","Only automatic instance termination after 24 hours"],"a":1,"e":"Alarms can trigger Auto Scaling policies, send SNS notifications, invoke Lambda functions, and create incidents in Systems Manager."},{"t":10,"dif":3,"q":"What does AWS CloudFormation do?","o":["Monitors application performance metrics in real time","Provisions and manages infrastructure using declarative templates","Provides DDoS protection at the network layer","Discovers and classifies sensitive data in storage"],"a":1,"e":"CloudFormation uses YAML/JSON templates to define infrastructure as code — enabling repeatable, version-controlled resource provisioning."},{"t":10,"dif":2,"q":"What is a CloudWatch Dashboard?","o":["A billing summary page in the AWS Console","A customizable page displaying metrics and graphs for your resources","A security overview showing IAM policy compliance","A network topology map of your VPC and subnets"],"a":1,"e":"Dashboards let you create custom views with graphs, metrics, and text widgets for monitoring your resources at a glance."},{"t":10,"dif":1,"q":"What is the difference between CloudWatch and CloudTrail?","o":["They are identical services with different names","CloudWatch monitors performance metrics; CloudTrail logs API calls","CloudWatch is free; CloudTrail requires Enterprise support","CloudWatch is for databases; CloudTrail is for compute"],"a":1,"e":"CloudWatch tracks operational metrics and logs. CloudTrail tracks WHO did WHAT and WHEN via API call audit logs."},{"t":10,"dif":2,"q":"What is a scaling policy?","o":["An IAM policy that allows scaling permissions","Rules that define when and how Auto Scaling adjusts capacity","A pricing policy that determines per-instance costs","A network policy that limits bandwidth per instance"],"a":1,"e":"Scaling policies define the conditions (metric thresholds, schedules) and actions (add/remove instances) for Auto Scaling."},{"t":10,"dif":3,"q":"What is predictive scaling in Auto Scaling?","o":["Manually predicting traffic and pre-provisioning instances","Using ML to forecast demand and proactively scale ahead of time","Scaling based only on CPU utilization after the fact","Using reserved instances to predict monthly costs"],"a":1,"e":"Predictive scaling uses machine learning to analyze historical patterns and proactively provision capacity before demand arrives."},{"t":10,"dif":1,"q":"What is AWS Config?","o":["A tool for configuring EC2 instance hardware specs","A service that tracks resource configuration changes over time","A code editor for writing Lambda function configurations","A CLI tool for managing AWS account settings"],"a":1,"e":"AWS Config records resource configurations, tracks changes over time, and evaluates compliance against desired configurations."},{"t":10,"dif":2,"q":"What is Amazon SNS commonly used for in monitoring?","o":["Storing monitoring data in a time-series database","Sending alert notifications via email, SMS, or HTTP endpoints","Automatically scaling EC2 instances based on demand","Encrypting CloudWatch logs before long-term storage"],"a":1,"e":"SNS (Simple Notification Service) delivers alert messages from CloudWatch Alarms, Budgets, and other services to subscribers."},{"t":11,"dif":1,"q":"What is Amazon SageMaker?","o":["A managed relational database service","A platform for building, training, and deploying ML models","A content delivery network for media files","A container orchestration tool for Docker images"],"a":1,"e":"SageMaker provides an end-to-end ML platform with notebooks, algorithms, training infrastructure, and one-click deployment."},{"t":11,"dif":1,"q":"What does Amazon Rekognition analyze?","o":["Audio files for speech transcription","Images and video for objects, faces, text, and activities","Database queries for performance optimization","Network packets for security threats"],"a":1,"e":"Rekognition uses deep learning to detect objects, faces, text, scenes, and activities in images and video — no ML expertise needed."},{"t":11,"dif":1,"q":"What does Amazon Transcribe do?","o":["Converts text into natural-sounding speech","Converts speech audio into accurate text transcriptions","Translates text from one language to another","Analyzes text for sentiment and key phrases"],"a":1,"e":"Transcribe uses deep learning for automatic speech-to-text, supporting real-time streaming and batch processing."},{"t":11,"dif":1,"q":"What does Amazon Polly do?","o":["Converts speech audio into written text","Converts text into lifelike speech in dozens of languages","Detects objects and faces in images","Extracts structured data from scanned documents"],"a":1,"e":"Polly turns text into natural-sounding speech, useful for accessibility features, voice-enabled apps, and audio content generation."},{"t":11,"dif":2,"q":"What does Amazon Comprehend do?","o":["Translates documents between 75+ languages","Uses NLP to extract sentiment, entities, and key phrases from text","Transcribes audio recordings into text format","Generates images from text-based descriptions"],"a":1,"e":"Comprehend uses NLP to analyze text and find insights — sentiment (positive/negative), entities (people, places), topics, and language."},{"t":11,"dif":2,"q":"What does Amazon Translate provide?","o":["Speech-to-text transcription for audio files","Real-time neural machine translation between languages","Image recognition and object detection capabilities","Automated code translation between programming languages"],"a":1,"e":"Translate delivers fast, high-quality language translation at scale using neural networks."},{"t":11,"dif":2,"q":"What is Amazon Lex?","o":["A text analytics service for extracting sentiment","The same conversational AI behind Alexa — for building chatbots","A service for translating documents between languages","A code review tool that uses AI for bug detection"],"a":1,"e":"Lex provides speech recognition and natural language understanding to build voice and text chatbots."},{"t":11,"dif":2,"q":"What does Amazon Textract do?","o":["Generates synthetic text for ML training data","Extracts text, handwriting, tables, and forms from documents","Translates text between different natural languages","Converts text into speech audio in multiple voices"],"a":1,"e":"Textract goes beyond basic OCR to extract structured data (tables, key-value pairs) from scanned documents and forms."},{"t":11,"dif":2,"q":"What is Amazon Kendra?","o":["A service for scheduling ML training jobs","An intelligent enterprise search service powered by ML","A tool for managing Kubernetes cluster configurations","A data migration service for moving to DynamoDB"],"a":1,"e":"Kendra provides natural language search across enterprise data sources like S3, databases, SharePoint, and Salesforce."},{"t":11,"dif":3,"q":"What is Amazon Bedrock?","o":["The foundational networking layer underlying all AWS services","A service for accessing foundation models to build generative AI apps","A storage tier beneath S3 Glacier for extreme archival","A hardware accelerator chip designed for ML inference"],"a":1,"e":"Bedrock lets you build generative AI applications using foundation models from Anthropic, Meta, Cohere, Stability AI, and Amazon."},{"t":11,"dif":3,"q":"What is Amazon Q?","o":["A simple queue service for message passing","A generative AI assistant for answering questions and automating work","A quantum computing service for research simulations","A query optimization tool for Amazon Redshift"],"a":1,"e":"Amazon Q is an AI-powered assistant that answers questions about AWS and your company data, generates content, and takes actions."},{"t":11,"dif":3,"q":"What is Amazon Personalize?","o":["An IAM feature for customizing login pages","A service for building real-time individualized recommendation systems","A tool for personalizing CloudWatch dashboard layouts","A feature for customizing EC2 instance naming conventions"],"a":1,"e":"Personalize uses the same recommendation technology as Amazon.com to deliver individualized product, content, and search recommendations."},{"t":11,"dif":1,"q":"What is Amazon Forecast?","o":["A weather forecasting service for agriculture","A time-series forecasting service using ML for business predictions","A tool for predicting EC2 spot instance pricing trends","A service for forecasting your monthly AWS bill"],"a":1,"e":"Forecast uses ML to generate accurate predictions from historical time-series data — for inventory, revenue, staffing, and more."},{"t":11,"dif":2,"q":"What is AWS DeepRacer?","o":["A high-performance computing cluster for deep learning","An autonomous 1/18th-scale race car for learning reinforcement learning","A deep packet inspection tool for network security","A data pipeline service for deep analytics workloads"],"a":1,"e":"DeepRacer is a hands-on way to learn reinforcement learning — you train an autonomous model car in a 3D simulator or real track."},{"t":11,"dif":2,"q":"What is Amazon CodeWhisperer (now Amazon Q Developer)?","o":["A tool for whispering secrets between AWS services securely","An AI coding companion that suggests code in your IDE","A service for detecting whispered speech in audio recordings","A code review tool that checks for security vulnerabilities"],"a":1,"e":"Amazon Q Developer (formerly CodeWhisperer) provides real-time AI-powered code suggestions and completions in your code editor."},{"t":11,"dif":3,"q":"What is Amazon Augmented AI (A2I)?","o":["A service that automatically generates training data for ML","A workflow service for adding human review to ML predictions","An augmented reality rendering service for mobile apps","A tool that enhances CloudWatch dashboards with AI insights"],"a":1,"e":"A2I makes it easy to build workflows where humans review low-confidence ML predictions before they're used — essential for sensitive decisions."},{"t":11,"dif":1,"q":"Which AI service would you use to add image labeling to an app?","o":["Amazon Polly","Amazon Rekognition","Amazon Transcribe","Amazon Translate"],"a":1,"e":"Rekognition detects and labels objects, scenes, faces, and text in images — perfect for image labeling, content moderation, and search."},{"t":11,"dif":2,"q":"Which service would you use to build a voice-controlled assistant?","o":["Amazon Comprehend","Amazon Textract","Amazon Lex","Amazon Personalize"],"a":2,"e":"Lex provides the speech recognition and natural language understanding needed to build conversational voice and text interfaces."},{"t":11,"dif":3,"q":"What is Amazon SageMaker Canvas?","o":["A digital whiteboard for diagramming ML workflows","A no-code ML tool that lets business users build predictions visually","A service for rendering ML model outputs as images","A canvas for designing SageMaker notebook layouts"],"a":1,"e":"SageMaker Canvas provides a visual, no-code interface for business analysts to generate ML predictions without writing any code."},{"t":11,"dif":2,"q":"What does Amazon Fraud Detector do?","o":["Detects physical intruders in AWS data centers","Uses ML to identify potentially fraudulent online activities","Monitors AWS accounts for unauthorized API calls","Scans S3 buckets for malicious file uploads"],"a":1,"e":"Fraud Detector uses ML models trained on Amazon's fraud detection expertise to identify suspicious online transactions and account activities."},{"t":1,"dif":1,"q":"What is the main advantage of 'pay-as-you-go' over traditional IT?","o":["You always get the fastest hardware available","You eliminate the risk of over-provisioning or under-provisioning","You never have to worry about security at all","You get permanent ownership of all infrastructure used"],"a":1,"e":"Pay-as-you-go means you only pay for what you use, eliminating wasted capacity from over-provisioning and performance issues from under-provisioning."},{"t":1,"dif":2,"q":"What is the difference between scalability and elasticity?","o":["They mean exactly the same thing in AWS","Scalability is the ability to grow; elasticity is automatic scaling with demand","Scalability is for storage; elasticity is only for compute","Elasticity costs more than scalability in all cases"],"a":1,"e":"Scalability is the general ability to handle growth. Elasticity specifically means resources automatically scale up and down with real-time demand."},{"t":1,"dif":2,"q":"What does 'Retain' mean in the 6 R's of migration?","o":["Delete the application and all its data permanently","Keep the application in its current environment for now","Rewrite the application from scratch using serverless","Move the application to a different cloud provider entirely"],"a":1,"e":"Retain means intentionally keeping certain workloads on-premises — they may not be ready for migration or have dependencies that prevent it."},{"t":1,"dif":3,"q":"Which Well-Architected pillar focuses on using compute resources efficiently?","o":["Operational Excellence","Reliability","Performance Efficiency","Cost Optimization"],"a":2,"e":"Performance Efficiency focuses on using computing resources efficiently — selecting the right resource types and sizes, monitoring performance, and evolving as technology changes."},{"t":1,"dif":1,"q":"What does 'go global in minutes' mean as a cloud benefit?","o":["AWS sales teams respond to inquiries within minutes","You can deploy infrastructure in multiple Regions very quickly","All AWS services become available globally at the same time","International phone support has less than one minute wait time"],"a":1,"e":"Cloud lets you deploy applications to multiple AWS Regions worldwide in minutes without building physical data centers."},{"t":1,"dif":2,"q":"What is multi-tenancy in cloud computing?","o":["Running multiple applications on a single laptop","Multiple customers sharing the same physical infrastructure securely","Having multiple AWS accounts under one organization","Using more than one programming language in an application"],"a":1,"e":"Multi-tenancy means multiple customers share the same underlying physical hardware, with logical isolation ensuring security and privacy between tenants."},{"t":1,"dif":3,"q":"What does the 'Retire' strategy mean in cloud migration?","o":["Archive the application data to Glacier for long-term storage","Decommission applications that are no longer needed or useful","Move the application to a competitors cloud platform","Rewrite the application in a more modern programming language"],"a":1,"e":"Retire means identifying applications that are no longer useful and turning them off, reducing the portfolio you need to manage and migrate."},{"t":1,"dif":1,"q":"Which is an example of a SaaS application?","o":["Amazon EC2 virtual servers","AWS Lambda serverless functions","Salesforce CRM or Gmail email service","Amazon VPC networking components"],"a":2,"e":"SaaS applications like Salesforce and Gmail are fully managed by the provider — users just access the software through a browser."},{"t":1,"dif":2,"q":"What is the difference between horizontal and vertical scaling?","o":["Horizontal is cheaper; vertical is always more expensive","Horizontal adds more instances; vertical makes one instance bigger","Horizontal is for databases; vertical is for web servers only","Horizontal requires Reserved Instances; vertical uses On-Demand only"],"a":1,"e":"Horizontal scaling (scale out) adds more instances to distribute load. Vertical scaling (scale up) increases the CPU/RAM of a single instance."},{"t":1,"dif":1,"q":"What does AWS handle in a managed service?","o":["Only the billing and invoicing for the service","Infrastructure management like patching, backups, and scaling","Writing your application code and business logic","Designing your database schema and data models"],"a":1,"e":"Managed services handle undifferentiated heavy lifting — provisioning, patching, backups, monitoring, and scaling — so you focus on your application."},{"t":1,"dif":3,"q":"What is the AWS Well-Architected Review?","o":["A mandatory annual audit required by AWS for all accounts","A process to evaluate workloads against the six Framework pillars","A security scan that AWS performs on all deployed resources","A pricing review to ensure you are on the cheapest plan"],"a":1,"e":"A Well-Architected Review evaluates your workload against the six pillars to identify high-risk issues and find improvement opportunities."},{"t":1,"dif":2,"q":"What is a benefit of AWS's massive global infrastructure?","o":["All services are completely free in every Region worldwide","Lower latency and higher fault tolerance for your applications","AWS guarantees 100% uptime for all services globally","You can only deploy in one Region but with unlimited capacity"],"a":1,"e":"AWS's global footprint lets you deploy near users for low latency and across AZs/Regions for fault tolerance and disaster recovery."},{"t":1,"dif":1,"q":"What is PaaS in cloud computing?","o":["Physical hardware as a service for on-premises deployment","A platform where you deploy code and the provider manages infrastructure","A fully managed application you use through a web browser","A raw virtual machine where you manage everything yourself"],"a":1,"e":"Platform as a Service (e.g., Elastic Beanstalk) manages the infrastructure — you just deploy your application code."},{"t":1,"dif":2,"q":"What does 'undifferentiated heavy lifting' refer to?","o":["The physical labor of moving servers into data centers","Routine IT tasks like patching and backups that don't differentiate your business","The process of writing unique business logic for your application","Training machine learning models on custom datasets"],"a":1,"e":"Tasks like server patching, backup management, and hardware procurement don't make your product unique — AWS handles these so you focus on innovation."},{"t":1,"dif":3,"q":"What are the six perspectives of the AWS Cloud Adoption Framework?","o":["Compute, Storage, Network, Database, Security, Billing","Business, People, Governance, Platform, Security, Operations","Plan, Build, Test, Deploy, Monitor, Optimize","Frontend, Backend, DevOps, QA, Analytics, Support"],"a":1,"e":"CAF organizes guidance into six perspectives that cover both business and technical aspects of cloud transformation."},{"t":1,"dif":1,"q":"What is the benefit of 'stopping guessing capacity'?","o":["You never need to monitor resource utilization at all","You provision exact resources needed instead of over or under-provisioning","AWS automatically writes your application code for you","You receive a fixed monthly bill regardless of actual usage"],"a":1,"e":"In the cloud, you scale resources up and down based on actual demand instead of guessing months in advance and either wasting money or running short."},{"t":1,"dif":2,"q":"What does 'design for failure' mean as a cloud principle?","o":["Accept that your application will always be broken and slow","Build systems that automatically detect and recover from component failures","Use the cheapest possible instances to minimize financial risk","Avoid using any managed services to prevent vendor lock-in"],"a":1,"e":"Design for failure means assuming any component can fail at any time and architecting redundancy, health checks, and auto-recovery from the start."},{"t":1,"dif":3,"q":"What distinguishes a cloud-native application from a traditional one?","o":["It can only run on AWS and not on any other platform","It uses microservices, containers, serverless, and automation by design","It is written exclusively in Python or JavaScript languages","It requires no database or persistent storage of any kind"],"a":1,"e":"Cloud-native apps are designed from the ground up to exploit cloud advantages — microservices architecture, containerization, CI/CD, and dynamic scaling."},{"t":1,"dif":1,"q":"What is the AWS Management Console?","o":["A command-line interface for scripting AWS operations","A web-based graphical interface for managing AWS resources","A physical hardware console located in AWS data centers","A mobile-only app for monitoring AWS billing and costs"],"a":1,"e":"The Console is a web-based GUI where you can manage all AWS services — launch instances, configure security, view billing, etc."},{"t":1,"dif":2,"q":"What is the AWS CLI?","o":["A graphical dashboard for visualizing AWS resource usage","A command-line tool for managing AWS services via terminal commands","A container orchestration platform built into every EC2 instance","A configuration language for writing CloudFormation templates"],"a":1,"e":"The AWS CLI lets you control AWS services from your terminal/command prompt, enabling automation and scripting of AWS operations."},{"t":2,"dif":1,"q":"What is the difference between CapEx and OpEx?","o":["CapEx is cloud spending; OpEx is on-premises spending","CapEx is upfront hardware purchases; OpEx is ongoing usage-based payments","CapEx is always cheaper; OpEx is always more expensive","CapEx requires no planning; OpEx requires annual contracts"],"a":1,"e":"Capital Expenditure (CapEx) is upfront investment in physical assets. Operating Expenditure (OpEx) is ongoing costs for services consumed — cloud is OpEx."},{"t":2,"dif":2,"q":"What is a Dedicated Host in EC2 pricing?","o":["A shared server with priority access during peak hours","A physical server fully dedicated to your use for license compliance","A virtual machine that cannot be stopped or terminated","An instance type available only in the US East Region"],"a":1,"e":"Dedicated Hosts provide a physical server dedicated to you, useful for software licenses that require per-socket or per-core visibility."},{"t":2,"dif":3,"q":"What is the difference between Reserved Instances and Savings Plans?","o":["They are identical products with different names and branding","Reserved Instances lock you to specific instance types; Savings Plans are more flexible","Reserved Instances are cheaper; Savings Plans cost twice as much","Reserved Instances are for storage; Savings Plans are for compute only"],"a":1,"e":"RIs commit to a specific instance type/Region. Savings Plans commit to a $/hr spend and apply flexibly across instance families, sizes, and Regions."},{"t":2,"dif":1,"q":"What is the AWS Free Tier 't2.micro' offering?","o":["A free permanent EC2 instance with unlimited resources","750 hours/month of t2.micro for the first 12 months of a new account","A free instance that runs indefinitely with no time limit","A discounted instance only available with Business support plans"],"a":1,"e":"New AWS accounts get 750 hours/month of Linux and Windows t2.micro instances free for 12 months."},{"t":2,"dif":2,"q":"What does AWS Cost Anomaly Detection do?","o":["Blocks any spending that exceeds your monthly budget automatically","Uses ML to identify unusual spending patterns and alert you","Predicts your future costs for the next five years accurately","Automatically switches all instances to Spot pricing for savings"],"a":1,"e":"Cost Anomaly Detection uses machine learning to monitor your spending and alerts you when it detects unusual patterns or unexpected cost increases."},{"t":2,"dif":2,"q":"What is the benefit of using multiple AWS accounts with Organizations?","o":["Each account gets a separate Free Tier with full benefits","You can isolate workloads, manage billing, and apply different security policies","Multiple accounts always cost less than a single large account","Each account automatically gets its own dedicated physical servers"],"a":1,"e":"Multiple accounts provide workload isolation, independent security boundaries, separate billing, and granular permissions via SCPs."},{"t":2,"dif":1,"q":"How often does AWS release pricing reductions?","o":["Only when customers file formal price reduction requests","AWS regularly lowers prices as they achieve greater economies of scale","Prices are fixed and never change after initial launch","Price changes happen only once per year on January 1st"],"a":1,"e":"AWS has lowered prices over 100 times since launch as they achieve greater scale and pass savings to customers."},{"t":2,"dif":3,"q":"What is a Spot Fleet?","o":["A group of On-Demand instances in the same placement group","A collection of Spot Instances that maintains your target capacity","A fleet of Dedicated Hosts for license-sensitive workloads","A reserved capacity pool for guaranteed instance availability"],"a":1,"e":"A Spot Fleet requests and manages a group of Spot Instances (and optionally On-Demand) to meet your target capacity at the lowest possible cost."},{"t":2,"dif":2,"q":"What does the Developer support plan include?","o":["24/7 phone support and a Technical Account Manager","Business-hours email access to Cloud Support Associates","Only access to documentation and community forums","Unlimited support cases with 15-minute response time"],"a":1,"e":"Developer plan ($29/mo) provides business-hours email support from Cloud Support Associates, plus all Basic plan features."},{"t":2,"dif":1,"q":"What is an AWS account?","o":["A physical identification card for AWS data center access","A container for your AWS resources with its own billing and IAM","A subscription to a specific AWS service like EC2 or S3","A Region-specific workspace limited to one geographic area"],"a":1,"e":"An AWS account is the fundamental organizational unit — it contains your resources, has its own billing, root user, and IAM configuration."},{"t":2,"dif":2,"q":"What are AWS credits?","o":["A type of Reserved Instance with prepaid discount pricing","Promotional funds that offset your AWS bill, often from programs or events","Loyalty points earned from every dollar spent on AWS services","Virtual currency used exclusively in the AWS Marketplace store"],"a":1,"e":"AWS credits are promotional funds that automatically apply to your bill — often received from programs like Activate, training events, or promotions."},{"t":2,"dif":3,"q":"What is the difference between Standard and Convertible Reserved Instances?","o":["Standard is more expensive; Convertible is always cheaper to purchase","Standard locks the instance type; Convertible lets you change it mid-term","Standard is for Linux only; Convertible supports all operating systems","Standard has no discount; Convertible offers up to 72% savings"],"a":1,"e":"Standard RIs give the biggest discount but lock you to a specific instance type. Convertible RIs cost slightly more but let you change instance family, OS, and tenancy."},{"t":2,"dif":1,"q":"What happens if you exceed the Free Tier limits?","o":["Your account is automatically suspended until the next billing cycle","You are charged standard pay-as-you-go rates for the excess usage","AWS sends a warning and continues providing the service for free","All your resources are immediately terminated without any warning"],"a":1,"e":"If you exceed Free Tier limits, you simply pay standard on-demand rates for the additional usage — no account suspension."},{"t":2,"dif":2,"q":"What is a billing alarm in CloudWatch?","o":["An alarm that rings in the AWS office when you spend too much","A CloudWatch alarm that triggers when estimated charges exceed a threshold","A physical device installed at your office to track AWS spending","An automatic payment system that charges your credit card weekly"],"a":1,"e":"A billing alarm monitors your estimated AWS charges and sends an SNS notification when they exceed a threshold you define."},{"t":2,"dif":2,"q":"What does Total Cost of Ownership (TCO) compare?","o":["The cost of two different EC2 instance types for the same workload","The full cost of running on-premises vs. running in the cloud","The pricing differences between AWS, Azure, and Google Cloud","The cost of Reserved Instances vs. Spot Instances for the same job"],"a":1,"e":"TCO analysis compares the full cost of owning and operating on-premises infrastructure (hardware, staff, facilities, etc.) versus using the cloud."},{"t":2,"dif":3,"q":"What is AWS Enterprise On-Ramp support plan?","o":["A free introductory support plan for new enterprise customers","A plan between Business and Enterprise with a pool of TAMs and concierge support","A migration assistance program that provides free consulting services","A training program that certifies your staff on AWS best practices"],"a":1,"e":"Enterprise On-Ramp sits between Business and Enterprise tiers — it includes a pool of TAMs, concierge support, and <30min response for critical issues at a lower price than full Enterprise."},{"t":2,"dif":1,"q":"What is the primary purpose of the AWS Pricing Calculator?","o":["To calculate the resale value of used AWS hardware equipment","To estimate the monthly cost of an AWS architecture before deploying","To determine which Reserved Instance type gives the most savings","To compare AWS prices with Azure and Google Cloud competitors"],"a":1,"e":"The Pricing Calculator lets you configure services and get monthly cost estimates for planning purposes — before you spend anything."},{"t":2,"dif":2,"q":"What are AWS Savings Plans types?","o":["Compute Savings Plans and EC2 Instance Savings Plans","Storage Savings Plans and Database Savings Plans","Networking Savings Plans and Security Savings Plans","Lambda Savings Plans and Container Savings Plans"],"a":0,"e":"AWS offers Compute Savings Plans (flexible across instance families, Regions, OS) and EC2 Instance Savings Plans (locked to instance family/Region but cheaper)."},{"t":3,"dif":2,"q":"What is the purpose of AWS CloudFront Points of Presence (PoPs)?","o":["Running EC2 instances in more locations than standard Regions","Serving cached content to users from the nearest geographic location","Providing additional Availability Zones within existing Regions","Hosting customer databases closer to on-premises data centers"],"a":1,"e":"PoPs are the physical locations where CloudFront caches content — they include edge locations and regional edge caches."},{"t":3,"dif":1,"q":"How many Regions does AWS have approximately?","o":["About 5 Regions worldwide","About 15 Regions worldwide","Over 30 Regions worldwide","Over 100 Regions worldwide"],"a":2,"e":"AWS has 30+ Regions worldwide and continues to expand, with multiple Regions planned for future launch."},{"t":3,"dif":3,"q":"What is a Regional Edge Cache?","o":["A dedicated cache server within an Availability Zone for database queries","A larger CloudFront cache between edge locations and the origin server","A backup Region that activates during a primary Region outage","An on-premises caching appliance provided by AWS for hybrid setups"],"a":1,"e":"Regional Edge Caches sit between CloudFront edge locations and your origin, caching less-popular content closer than your origin but with more capacity than edge locations."},{"t":3,"dif":2,"q":"What is data sovereignty and how does it relate to Regions?","o":["It means AWS owns all customer data stored in their Regions","Laws requiring data to stay within geographic boundaries, addressed by Region choice","It guarantees all data is encrypted regardless of which Region is used","It means customers can freely move data between any Regions at no cost"],"a":1,"e":"Data sovereignty refers to laws and regulations requiring data to remain within specific geographic or political boundaries — you address this by choosing the appropriate Region."},{"t":3,"dif":1,"q":"Can data in one Region be automatically accessed from another Region?","o":["Yes, all data is globally replicated by default across all Regions","No, data stays in its Region unless you explicitly copy or replicate it","Yes, but only if you have an Enterprise support plan enabled","No, cross-Region access is not possible under any circumstances"],"a":1,"e":"Data stays in the Region where you put it — it does NOT replicate automatically. You must explicitly configure cross-Region replication."},{"t":3,"dif":2,"q":"What is the benefit of using multiple Regions for an application?","o":["It is required by AWS for all production workloads","It provides disaster recovery and serves users with lower latency globally","It automatically reduces the cost of all AWS services by half","It gives you access to more instance types not available in one Region"],"a":1,"e":"Multi-Region deployment provides disaster recovery (if one Region is impacted) and global low latency by serving users from the nearest Region."},{"t":3,"dif":3,"q":"What is the difference between edge locations and Regional Edge Caches?","o":["They are the same thing with different names used in different contexts","Edge locations are closer to users; Regional Edge Caches have more capacity and sit behind them","Edge locations are for compute; Regional Edge Caches are for databases only","Edge locations are free; Regional Edge Caches require Enterprise support"],"a":1,"e":"Edge locations are numerous and close to users. Regional Edge Caches are fewer but have more capacity, sitting between edge locations and your origin."},{"t":3,"dif":1,"q":"What is the relationship between Regions and Availability Zones?","o":["Each Region contains one AZ and one edge location exactly","Each Region contains multiple isolated AZs connected by low-latency links","AZs are shared across multiple Regions for cost efficiency","Regions and AZs are the same thing with different terminology"],"a":1,"e":"A Region is a geographic cluster of multiple AZs. Each AZ is physically separate with its own infrastructure but connected via low-latency private networking."},{"t":3,"dif":2,"q":"Why are Availability Zones physically separated from each other?","o":["To reduce the cost of building identical data centers in one location","To ensure a failure in one AZ does not impact another for fault isolation","To provide faster network speeds between different customer workloads","To comply with international data transfer regulations and treaties"],"a":1,"e":"Physical separation means a localized disaster (fire, flood, power outage) affecting one AZ won't bring down workloads running in other AZs."},{"t":3,"dif":2,"q":"How are Availability Zones within a Region connected?","o":["Through public internet connections that customers configure manually","Through high-bandwidth, low-latency private fiber-optic networking","Through satellite uplinks that provide global coverage and redundancy","Through VPN tunnels that are encrypted with customer-managed keys"],"a":1,"e":"AZs within a Region are connected by redundant, high-bandwidth, low-latency private fiber links, enabling synchronous replication."},{"t":4,"dif":1,"q":"What is the root user in an AWS account?","o":["A special IAM user created during the first CloudFormation deployment","The account owner with full unrestricted access to all AWS resources","An automated service account that manages billing and payments","A read-only administrator that can view but not modify resources"],"a":1,"e":"The root user has complete access to everything in the account. Best practice: enable MFA, don't use it daily, and use IAM users instead."},{"t":4,"dif":2,"q":"What is an IAM Group?","o":["A collection of AWS accounts under one organization umbrella","A collection of IAM users that share the same permission policies","A set of EC2 instances that share the same security group rules","A group of S3 buckets with identical access control settings"],"a":1,"e":"IAM Groups let you assign permissions to multiple users at once — attach a policy to a group and all members inherit those permissions."},{"t":4,"dif":2,"q":"What is an IAM Access Key?","o":["A physical key card used to access AWS data center facilities","A set of credentials (access key ID + secret) for programmatic API access","A recovery code used to reset a forgotten IAM user password","An encryption key stored in KMS for encrypting S3 objects"],"a":1,"e":"Access keys (key ID + secret) authenticate programmatic requests via the CLI, SDK, or API — treat the secret like a password."},{"t":4,"dif":3,"q":"What is AWS Artifact?","o":["A service for storing and versioning application build artifacts","A portal for downloading AWS compliance reports and agreements","A container registry for Docker images used in ECS and EKS","A CI/CD pipeline service for automating code deployments"],"a":1,"e":"Artifact provides on-demand access to AWS security and compliance documents like SOC reports, PCI DSS attestations, and ISO certifications."},{"t":4,"dif":1,"q":"What is the best practice for the root user account?","o":["Use it daily for all administrative tasks and operations","Enable MFA on it and use IAM users for daily operations","Share the root credentials with your entire development team","Delete the root user immediately after creating IAM users"],"a":1,"e":"Lock down the root user: enable MFA, create a strong password, don't create access keys for it, and use IAM users/roles for everyday work."},{"t":4,"dif":2,"q":"What does AWS CloudWatch Logs help with from a security perspective?","o":["Encrypting all data at rest across every AWS service automatically","Collecting and analyzing log data for security monitoring and troubleshooting","Scanning EC2 instances for known malware and virus signatures","Managing IAM user passwords and enforcing rotation policies"],"a":1,"e":"CloudWatch Logs centralizes log data from applications, OS, and AWS services — you can search, filter, and create alarms for security-relevant events."},{"t":4,"dif":3,"q":"What is AWS Certificate Manager (ACM)?","o":["A service for managing IAM user certification exams and training","A service for provisioning and managing SSL/TLS certificates","A tool for verifying compliance certifications for AWS services","An identity provider for federating users from Active Directory"],"a":1,"e":"ACM lets you provision, manage, and deploy public and private SSL/TLS certificates for use with AWS services like CloudFront, ALB, and API Gateway."},{"t":4,"dif":2,"q":"What is a Security Group's default behavior?","o":["It allows all inbound and outbound traffic by default","It denies all inbound traffic and allows all outbound traffic by default","It denies all traffic in both directions until rules are added","It allows all inbound traffic and denies all outbound traffic"],"a":1,"e":"By default, security groups block ALL inbound traffic (you must add allow rules) and permit ALL outbound traffic."},{"t":4,"dif":1,"q":"What is the purpose of AWS IAM?","o":["To monitor the performance and availability of AWS resources","To control who can access what resources in your AWS account","To provide a content delivery network for distributing web content","To manage the physical security of AWS data center facilities"],"a":1,"e":"IAM lets you create and manage users, groups, and roles with specific permissions controlling which AWS resources they can access."},{"t":4,"dif":3,"q":"What is Amazon Detective?","o":["A service for detecting and removing malware from EC2 instances","A service that analyzes and visualizes security data to investigate threats","A monitoring tool that detects unused resources for cost savings","A compliance checker that detects policy violations in your account"],"a":1,"e":"Detective automatically collects log data and uses ML, statistical analysis, and graph theory to help you investigate and identify the root cause of security findings."},{"t":4,"dif":2,"q":"What is the difference between authentication and authorization?","o":["They are the same concept with different names used interchangeably","Authentication verifies identity; authorization determines what actions are allowed","Authentication manages billing; authorization manages resource provisioning","Authentication is for users; authorization is only for AWS services"],"a":1,"e":"Authentication confirms WHO you are (login). Authorization determines WHAT you can do (permissions). IAM handles both."},{"t":4,"dif":2,"q":"What are AWS managed policies?","o":["Policies created and maintained by AWS that cover common use cases","Policies that only work with AWS managed services like RDS and Lambda","Policies that automatically apply to all users in every AWS account","Policies that require approval from AWS support before they take effect"],"a":0,"e":"AWS managed policies are pre-built policies maintained by AWS (like AmazonS3ReadOnlyAccess) that you can attach to users, groups, or roles."},{"t":4,"dif":3,"q":"What is AWS Secrets Manager?","o":["A service that manages IAM user passwords and enforces complexity","A service for storing, rotating, and retrieving secrets like database credentials","A tool for encrypting S3 objects with customer-managed encryption keys","A vault for storing physical access credentials to AWS data centers"],"a":1,"e":"Secrets Manager securely stores and automatically rotates secrets like database passwords, API keys, and tokens."},{"t":4,"dif":1,"q":"What is the purpose of security groups in a VPC?","o":["To group AWS users with similar job roles together","To act as a virtual firewall controlling instance-level traffic","To organize S3 buckets by security classification level","To define pricing groups for consolidated billing discounts"],"a":1,"e":"Security groups control inbound and outbound traffic to instances — you define rules specifying allowed protocols, ports, and source/destination IPs."},{"t":4,"dif":2,"q":"What is AWS SSO (now IAM Identity Center)?","o":["A service for optimizing the speed of single-server workloads","A service for centrally managing single sign-on access to multiple AWS accounts","A tool for synchronizing S3 objects across multiple AWS Regions","A feature that provides one-time passwords for all IAM users"],"a":1,"e":"IAM Identity Center (formerly AWS SSO) provides centralized SSO access to multiple AWS accounts and business applications."},{"t":5,"dif":1,"q":"What is a subnet in a VPC?","o":["A secondary internet connection for backup purposes","A range of IP addresses within your VPC tied to a specific AZ","A type of security group that applies to all instances","A billing category for tracking network-related costs"],"a":1,"e":"A subnet is a segment of your VPC's IP address range in a specific AZ — you launch resources into subnets."},{"t":5,"dif":2,"q":"What is the difference between an Internet Gateway and a NAT Gateway?","o":["They are identical devices with different names for different Regions","IGW enables two-way public internet access; NAT allows outbound-only for private subnets","IGW is for IPv6 only; NAT Gateway is for IPv4 only","IGW costs money; NAT Gateway is included free with every VPC"],"a":1,"e":"An Internet Gateway allows full two-way internet access for public subnets. A NAT Gateway lets private subnets make outbound connections only."},{"t":5,"dif":2,"q":"What is the default VPC in an AWS account?","o":["A VPC that AWS creates in every Region with pre-configured subnets and internet access","A VPC that you must manually create before launching any resources","A VPC that only exists if you have Enterprise support enabled","A VPC that is shared between all AWS accounts in the same Region"],"a":0,"e":"AWS creates a default VPC in each Region with public subnets, an internet gateway, and default security group — so you can launch instances immediately."},{"t":5,"dif":3,"q":"What is AWS Global Accelerator?","o":["A service that speeds up CloudFormation template deployments globally","A networking service that directs traffic to optimal AWS endpoints via the global network","A GPU-accelerated computing service for machine learning workloads","A CDN service that is functionally identical to Amazon CloudFront"],"a":1,"e":"Global Accelerator uses the AWS global network to route traffic to the nearest healthy endpoint, improving availability and performance for global applications."},{"t":5,"dif":1,"q":"What is a route table in a VPC?","o":["A table listing all EC2 instances and their public IP addresses","A set of rules that determine where network traffic is directed","A billing table showing network transfer costs per subnet","A log table recording all DNS queries made within the VPC"],"a":1,"e":"Route tables contain rules (routes) that determine where network traffic from subnets is sent — to the internet, to another subnet, to a VPN, etc."},{"t":5,"dif":2,"q":"What is an Elastic Network Interface (ENI)?","o":["A physical network card installed in AWS data center servers","A virtual network card you can attach to an EC2 instance in a VPC","A software tool for analyzing network packet captures","A monitoring interface for viewing real-time network throughput"],"a":1,"e":"An ENI is a virtual network interface with a private IP, security groups, and MAC address that you can attach/detach from instances."},{"t":5,"dif":3,"q":"What is AWS Site-to-Site VPN?","o":["A service connecting two VPCs in the same Region together privately","An encrypted tunnel between your on-premises network and your AWS VPC","A VPN client for individual remote workers to access AWS resources","A dedicated physical connection similar to AWS Direct Connect"],"a":1,"e":"Site-to-Site VPN creates an encrypted IPsec tunnel between your on-premises router and a Virtual Private Gateway in your VPC."},{"t":5,"dif":1,"q":"What is a CIDR block in the context of VPCs?","o":["A security certificate used for encrypting VPC network traffic","A notation that defines the IP address range for your VPC or subnet","A billing code that identifies network costs in your AWS invoice","A type of DNS record used exclusively within private VPCs"],"a":1,"e":"CIDR (Classless Inter-Domain Routing) notation like 10.0.0.0/16 defines the IP address range available in your VPC."},{"t":5,"dif":2,"q":"What is VPC Flow Logs?","o":["A feature that logs every object uploaded to S3 from a VPC","A feature that captures information about IP traffic going to and from network interfaces","A tool that tracks the flow of money spent on VPC resources","A service that logs every DNS resolution request within a VPC"],"a":1,"e":"VPC Flow Logs capture metadata about network traffic (source, destination, port, action, bytes) — useful for monitoring, troubleshooting, and security analysis."},{"t":5,"dif":2,"q":"What is the purpose of Amazon Route 53 health checks?","o":["Verifying that IAM users have valid MFA devices configured","Monitoring endpoint health and routing traffic away from unhealthy resources","Checking that all EC2 instances have the latest security patches installed","Validating that S3 bucket policies comply with security best practices"],"a":1,"e":"Route 53 health checks monitor the health of your resources and can automatically route traffic away from unhealthy endpoints to healthy ones."},{"t":5,"dif":3,"q":"What is the difference between an ALB and an NLB?","o":["ALB is cheaper; NLB is always more expensive for the same traffic","ALB operates at Layer 7 (HTTP); NLB operates at Layer 4 (TCP/UDP) for ultra-low latency","ALB is for private subnets; NLB is for public subnets only","ALB handles more traffic; NLB is limited to small workloads only"],"a":1,"e":"ALB understands HTTP/HTTPS and can route based on content (paths, headers). NLB handles TCP/UDP at extreme performance with ultra-low latency."},{"t":5,"dif":1,"q":"What does DNS stand for and what does it do?","o":["Data Network Security — it encrypts all network communications","Domain Name System — it translates domain names into IP addresses","Dynamic Node Scaling — it automatically scales EC2 instances","Distributed Network Storage — it stores data across multiple locations"],"a":1,"e":"DNS translates human-readable domain names (like example.com) into IP addresses (like 192.0.2.1) that computers use to connect."},{"t":6,"dif":1,"q":"What is the main difference between EC2 and Lambda?","o":["EC2 is newer; Lambda is an older legacy service being retired","EC2 gives you full server control; Lambda runs code without server management","EC2 is free; Lambda charges per hour of server uptime","EC2 is for web apps; Lambda is only for database operations"],"a":1,"e":"EC2 provides virtual servers you fully manage. Lambda runs code in response to events with zero server management — you pay per execution."},{"t":6,"dif":2,"q":"What is an EC2 Security Group?","o":["An IAM group specifically for users who manage EC2 instances","A virtual firewall that controls inbound and outbound traffic for an instance","A pricing group that bundles EC2 instances for volume discounts","An Auto Scaling group that maintains a fixed number of instances"],"a":1,"e":"Security groups are stateful firewalls attached to instances — you define allow rules for inbound and outbound traffic."},{"t":6,"dif":2,"q":"What is Amazon ECR?","o":["A compute service for running serverless batch processing jobs","A fully managed Docker container registry for storing container images","An encryption service for rotating credentials automatically","A monitoring dashboard for Elastic Container Service clusters"],"a":1,"e":"Elastic Container Registry (ECR) is a managed Docker registry for storing, managing, and deploying container images used by ECS and EKS."},{"t":6,"dif":3,"q":"What is an EC2 Dedicated Instance?","o":["An instance that runs on shared hardware but with priority scheduling","An instance on hardware dedicated to your account but not a specific physical server","An instance permanently attached to a specific EBS volume and IP address","An instance that cannot be stopped or hibernated once it is launched"],"a":1,"e":"Dedicated Instances run on hardware dedicated to your account (no other tenants) but may move between physical servers. Dedicated Hosts give you a specific physical server."},{"t":6,"dif":1,"q":"What programming languages does Lambda support?","o":["Only Java and C++ for enterprise-grade applications","Python, Node.js, Java, Go, .NET, Ruby, and custom runtimes","Only Python for machine learning and data processing","Only JavaScript for web application backend services"],"a":1,"e":"Lambda natively supports Python, Node.js, Java, Go, .NET, Ruby, and lets you bring any language via custom runtimes and container images."},{"t":6,"dif":2,"q":"What is the maximum execution time for a single Lambda function invocation?","o":["30 seconds per invocation","5 minutes per invocation","15 minutes per invocation","60 minutes per invocation"],"a":2,"e":"Lambda functions can run for up to 15 minutes (900 seconds) per invocation. For longer tasks, use Step Functions, ECS, or Batch."},{"t":6,"dif":2,"q":"What is user data in EC2?","o":["Personal information about the account owner stored in metadata","A script that runs automatically when an instance first launches","The data stored by end users on the instances EBS volumes","IAM credentials embedded in the instance for API authentication"],"a":1,"e":"User data is a script (bash or PowerShell) you provide when launching an instance — it runs once at first boot to automate setup tasks."},{"t":6,"dif":3,"q":"What is AWS Graviton?","o":["A service for managing gravitational data from satellite sensors","Custom ARM-based processors designed by AWS for better price-performance","A GPU-accelerated instance type for training machine learning models","A monitoring tool that measures the computational weight of workloads"],"a":1,"e":"Graviton processors are custom ARM chips designed by AWS, offering up to 40% better price-performance than comparable x86 instances."},{"t":6,"dif":1,"q":"What is an instance type in EC2?","o":["The operating system installed on the virtual server","The combination of CPU, memory, storage, and networking capacity","The pricing model applied to the instance (On-Demand, Spot, etc)","The AWS Region where the instance is physically located"],"a":1,"e":"Instance types (like t3.large or c5.xlarge) define the hardware specs — vCPUs, memory, storage, and network performance available to your instance."},{"t":6,"dif":2,"q":"What is an Elastic Beanstalk environment?","o":["A text editor for writing application configuration files","A collection of AWS resources running a single application version","A testing sandbox isolated from all other AWS resources","A monitoring dashboard showing application health metrics only"],"a":1,"e":"An environment is the collection of AWS resources (EC2, ELB, ASG, etc.) that Beanstalk provisions and manages to run your application."},{"t":6,"dif":3,"q":"What is AWS Outposts Servers?","o":["Physical servers in AWS data centers reserved for a single customer","Smaller Outposts form factors for locations with limited space","Emergency backup servers activated during Region-wide outages","Virtual servers optimized for running on-premises legacy applications"],"a":1,"e":"Outposts Servers are smaller Outposts options (1U/2U servers) that bring AWS compute and storage to locations with space constraints."},{"t":6,"dif":1,"q":"What is an EBS snapshot?","o":["A real-time copy of data that changes as the source volume changes","A point-in-time backup of an EBS volume stored in S3","A live migration of an EBS volume to a different Availability Zone","An encryption process that converts an unencrypted volume to encrypted"],"a":1,"e":"Snapshots capture a point-in-time backup of your EBS volume, stored in S3. You can use them to restore volumes or create new ones."},{"t":7,"dif":1,"q":"What is an S3 bucket?","o":["A virtual server for running containerized applications on AWS","A container for storing objects (files) in Amazon S3","A database table for storing structured relational data","A message queue for passing data between microservices"],"a":1,"e":"An S3 bucket is a logical container that holds objects. Each object consists of data, metadata, and a unique key (name)."},{"t":7,"dif":2,"q":"What is S3 Object Lock?","o":["A security feature that prevents unauthorized users from viewing objects","A feature that prevents objects from being deleted or overwritten for a set period","A method for locking an S3 bucket so no new objects can be uploaded","An encryption setting that locks objects with a specific KMS key"],"a":1,"e":"Object Lock uses a WORM (Write Once Read Many) model to prevent objects from being deleted or overwritten, for compliance and data protection."},{"t":7,"dif":3,"q":"What is S3 Transfer Acceleration?","o":["A feature that compresses objects before storage to save space","A feature using CloudFront edge locations to speed up uploads to S3","A service that migrates data from on-premises storage to S3 automatically","A pricing tier that charges less for high-volume data transfers"],"a":1,"e":"Transfer Acceleration routes uploads through the nearest CloudFront edge location and then over AWS's optimized network path to S3."},{"t":7,"dif":1,"q":"What is Amazon S3 Glacier?","o":["A high-performance storage class for frequently accessed hot data","A low-cost storage class designed for long-term archival of cold data","A temporary storage location for data being processed by Lambda","A storage class exclusively for database backups from RDS"],"a":1,"e":"Glacier offers very low storage costs for archive data you rarely access, with retrieval options ranging from minutes to hours."},{"t":7,"dif":2,"q":"What is the difference between S3 Glacier Flexible Retrieval and Deep Archive?","o":["They are identical services with different names in different Regions","Flexible offers minute-to-hour retrieval; Deep Archive offers 12-48 hour retrieval at lower cost","Flexible is for small files only; Deep Archive is for files larger than 5GB","Flexible is always free; Deep Archive charges per retrieval request"],"a":1,"e":"Glacier Flexible Retrieval offers expedited (1-5 min), standard (3-5 hr), or bulk (5-12 hr) retrieval. Deep Archive is cheapest but retrieval takes 12-48 hours."},{"t":7,"dif":2,"q":"What is an S3 access point?","o":["A physical location where you can upload data to S3 via USB drive","A named network endpoint with its own permissions for accessing a shared bucket","A billing endpoint that tracks costs for a specific set of S3 objects","A monitoring endpoint that logs all access to a specific S3 bucket"],"a":1,"e":"Access points are named network endpoints with dedicated policies, simplifying data access management for shared buckets with many different users or applications."},{"t":7,"dif":1,"q":"Can S3 host a static website?","o":["No, S3 can only store files and cannot serve web content directly","Yes, S3 can host static websites with HTML, CSS, and JavaScript files","Yes, but only if you also deploy an EC2 instance as a web server","No, you must use CloudFront to serve any web content from S3"],"a":1,"e":"S3 can host static websites directly — you enable website hosting on a bucket and upload HTML, CSS, JS, and image files."},{"t":7,"dif":3,"q":"What is AWS DataSync?","o":["A tool for synchronizing IAM policies across multiple AWS accounts","A service for automating data transfer between on-premises and AWS storage","A feature that keeps EBS volumes synchronized between two AZs","A database synchronization tool for keeping RDS replicas in sync"],"a":1,"e":"DataSync automates and accelerates moving large amounts of data between on-premises storage and AWS services like S3, EFS, and FSx."},{"t":7,"dif":2,"q":"What is the durability of S3 Standard?","o":["99.9% (three nines) durability for most objects stored","99.99% (four nines) durability with occasional data loss expected","99.999999999% (eleven nines) durability — virtually zero data loss","100% durability — AWS guarantees no object will ever be lost"],"a":2,"e":"S3 Standard provides 99.999999999% (11 nines) durability — designed to sustain the loss of data in two facilities simultaneously."},{"t":7,"dif":2,"q":"What is the S3 Storage Lens?","o":["A magnifying tool for viewing individual object metadata in detail","An analytics dashboard providing organization-wide visibility into S3 storage","A cost optimization tool that automatically deletes unused S3 objects","A security scanner that checks S3 bucket policies for vulnerabilities"],"a":1,"e":"Storage Lens delivers organization-wide visibility into object storage usage, activity trends, and cost optimization recommendations."},{"t":8,"dif":1,"q":"What does 'managed database' mean?","o":["A database that you install, configure, and maintain on your own servers","A database where AWS handles provisioning, patching, backups, and failover","A database that is managed by a third-party vendor outside of AWS","A database that is completely free of charge with no usage limits"],"a":1,"e":"A managed database means AWS handles the operational overhead — hardware provisioning, OS/DB patching, backups, and failover — while you focus on your data."},{"t":8,"dif":2,"q":"What is Amazon MemoryDB for Redis?","o":["A disk-based database that caches frequently accessed data in memory","A Redis-compatible in-memory database with durable storage for primary database use","An in-memory computing platform for running scientific simulations","A caching layer that sits in front of DynamoDB for faster reads"],"a":1,"e":"MemoryDB is a durable, Redis-compatible in-memory database — unlike ElastiCache (cache layer), MemoryDB can serve as your primary database."},{"t":8,"dif":3,"q":"What is Amazon QLDB?","o":["A query language database that only supports SQL syntax queries","A fully managed ledger database providing cryptographically verifiable transaction logs","A database query logging service that records all SQL statements executed","A database that uses quantum computing for faster query processing"],"a":1,"e":"QLDB is a ledger database that provides a transparent, immutable, and cryptographically verifiable transaction log — useful for audit and compliance."},{"t":8,"dif":2,"q":"What is the difference between SQL and NoSQL databases?","o":["SQL is always faster; NoSQL is always slower for all workloads","SQL uses fixed schemas with tables and joins; NoSQL uses flexible schemas for varied data models","SQL is only for small data; NoSQL is only for big data workloads","SQL is older and deprecated; NoSQL is the only modern approach"],"a":1,"e":"SQL databases (RDS, Aurora) use structured schemas with tables, rows, and joins. NoSQL databases (DynamoDB, DocumentDB) use flexible schemas optimized for specific access patterns."},{"t":8,"dif":1,"q":"What is the benefit of automatic backups in RDS?","o":["They eliminate the need for any disaster recovery planning entirely","They provide point-in-time recovery without manual intervention","They create a full copy of your database in a different Region hourly","They guarantee zero Recovery Point Objective for all failure scenarios"],"a":1,"e":"RDS automated backups enable point-in-time recovery — you can restore your database to any second within your retention period."},{"t":8,"dif":2,"q":"What is Amazon DynamoDB Accelerator (DAX)?","o":["A pricing discount for DynamoDB heavy-usage customers","A fully managed in-memory cache that sits in front of DynamoDB tables","A tool for migrating data from relational databases to DynamoDB","A feature that compresses DynamoDB items for faster read performance"],"a":1,"e":"DAX is a fully managed, in-memory cache for DynamoDB that delivers up to 10x read performance improvement — from milliseconds to microseconds."},{"t":8,"dif":3,"q":"What is Amazon Aurora Serverless?","o":["A version of Aurora that runs without any database engine installed","An on-demand auto-scaling configuration where Aurora scales capacity automatically","A free tier of Aurora available only to new AWS account holders","A read-only version of Aurora used exclusively for analytics queries"],"a":1,"e":"Aurora Serverless automatically starts, stops, and scales capacity based on demand — great for infrequent, intermittent, or unpredictable workloads."},{"t":8,"dif":1,"q":"Which database service is best for data warehousing and analytics?","o":["Amazon DynamoDB for NoSQL analytics","Amazon RDS for relational analytics","Amazon Redshift for SQL-based data warehousing","Amazon ElastiCache for in-memory analytics"],"a":2,"e":"Redshift is purpose-built for analytics — it uses columnar storage and parallel queries to analyze petabytes of structured data efficiently."},{"t":8,"dif":2,"q":"What database engines does Amazon RDS support?","o":["Only MySQL and PostgreSQL, no other engine options","MySQL, PostgreSQL, MariaDB, Oracle, SQL Server, and Aurora","Only Oracle and SQL Server for enterprise customers","Only Aurora, which replaces all other engine options"],"a":1,"e":"RDS supports six engines: MySQL, PostgreSQL, MariaDB, Oracle, Microsoft SQL Server, and Amazon Aurora."},{"t":8,"dif":3,"q":"What is the difference between ElastiCache and MemoryDB for Redis?","o":["They are identical services sold under different names and pricing models","ElastiCache is a cache layer; MemoryDB is a durable primary database","ElastiCache uses Redis; MemoryDB uses a proprietary AWS protocol","ElastiCache is serverless; MemoryDB requires manual capacity management"],"a":1,"e":"ElastiCache is designed as a caching layer in front of another database. MemoryDB provides durability and can serve as your primary database."},{"t":9,"dif":1,"q":"What is redundancy in cloud architecture?","o":["Running duplicate components so if one fails another takes over","Using the cheapest possible resources to minimize total costs","Encrypting data multiple times with different encryption keys","Deploying all resources in a single AZ for simplified management"],"a":0,"e":"Redundancy means having duplicate components (servers, databases, network paths) so that if one fails, another seamlessly takes over."},{"t":9,"dif":2,"q":"What is the difference between RPO and RTO?","o":["RPO is the cost of recovery; RTO is the time to recover resources","RPO is max acceptable data loss; RTO is max acceptable downtime","RPO applies to storage only; RTO applies to compute resources only","RPO is measured in dollars; RTO is measured in server instances"],"a":1,"e":"Recovery Point Objective (RPO) = how much data loss is acceptable. Recovery Time Objective (RTO) = how long downtime can last before recovery."},{"t":9,"dif":3,"q":"What is the 'pilot light' disaster recovery strategy?","o":["A fully active duplicate environment running in a second Region at all times","A minimal version of the environment always running, scaled up when needed","A completely cold backup with no running resources until a disaster occurs","An automated alert system that notifies the team when disasters are detected"],"a":1,"e":"Pilot light keeps core components (like a database replica) running in a DR Region. During a disaster, you scale up the rest of the environment."},{"t":9,"dif":2,"q":"What does 'right-sizing' mean in cloud architecture?","o":["Choosing the correct physical dimensions for your on-premises servers","Matching instance types and sizes to actual workload requirements for cost and performance","Selecting the largest possible instances to ensure you never run out of capacity","Using only one instance type across your entire infrastructure for simplicity"],"a":1,"e":"Right-sizing means analyzing your workloads and selecting the optimal instance types and sizes — not too big (wasteful) and not too small (underperforming)."},{"t":9,"dif":1,"q":"What is a single point of failure?","o":["A component with redundant backups across multiple Availability Zones","A component whose failure would cause the entire system to stop working","A security vulnerability in an IAM policy that allows unauthorized access","A billing configuration that sends all charges to a single payment method"],"a":1,"e":"A single point of failure (SPOF) is any component without redundancy — if it fails, the entire system goes down. Good architecture eliminates SPOFs."},{"t":9,"dif":2,"q":"What is the benefit of using managed services in your architecture?","o":["Managed services are always free to use for all customers","They reduce operational burden so you focus on business logic instead of infrastructure","Managed services guarantee zero downtime for all workloads under all conditions","They eliminate the need for any monitoring or alerting in your architecture"],"a":1,"e":"Managed services handle undifferentiated heavy lifting (patching, scaling, HA) so you can focus engineering time on features that differentiate your business."},{"t":9,"dif":3,"q":"What is a multi-site active-active DR strategy?","o":["Running two completely separate applications in two different Regions","Running the full workload in two or more Regions simultaneously, serving traffic from all","Having a warm standby in a second Region that receives read-only traffic","Backing up data to S3 in a different Region every 24 hours automatically"],"a":1,"e":"Active-active means your application runs fully in multiple Regions simultaneously — traffic is served from all Regions, providing near-zero RTO/RPO."},{"t":9,"dif":2,"q":"What is 'cattle vs pets' in cloud architecture?","o":["A pricing model comparing Spot Instances to Reserved Instances","A philosophy: treat servers as disposable (cattle) not irreplaceable (pets)","A security model where sensitive data is the pet and public data is cattle","A scaling approach where small instances are cattle and large ones are pets"],"a":1,"e":"Pets are servers you nurse back to health when sick. Cattle are identical, replaceable servers — if one fails, you terminate it and spin up a new one."},{"t":9,"dif":1,"q":"Why should you avoid hardcoding credentials in application code?","o":["Hardcoded credentials make the application run slower and use more memory","If the code is exposed, attackers can access your resources with those credentials","AWS automatically rejects API calls that come from hardcoded credentials","Hardcoded credentials are not compatible with On-Demand EC2 instances"],"a":1,"e":"Hardcoded credentials in code or config files are a major security risk. Use IAM roles, Secrets Manager, or Parameter Store instead."},{"t":9,"dif":2,"q":"What is the benefit of using multiple Availability Zones?","o":["Resources in multiple AZs are automatically cheaper per hour","It provides high availability because AZ failures don't take down your entire system","Using multiple AZs gives you more instance types to choose from","Multiple AZs automatically encrypt all data with different keys per AZ"],"a":1,"e":"Multi-AZ deployment means if one AZ has an outage, your application continues running in other AZs — providing high availability and fault tolerance."},{"t":10,"dif":1,"q":"What is a CloudWatch metric?","o":["A billing charge tracked in the AWS Cost Explorer dashboard","A time-ordered set of data points representing a resource's behavior over time","A log message written by an application to standard output","An alarm notification sent to an SNS topic when thresholds are breached"],"a":1,"e":"Metrics are the fundamental concept in CloudWatch — they are time-ordered data points (like CPU utilization, request count) published by AWS services."},{"t":10,"dif":2,"q":"What is a CloudWatch Log Group?","o":["A group of CloudWatch alarms that trigger at the same threshold","A container for log streams that share the same retention and access settings","A collection of EC2 instances that send metrics to the same dashboard","A security group specifically for resources that generate log data"],"a":1,"e":"A Log Group is a collection of log streams (from the same source) that share retention, monitoring, and access control settings."},{"t":10,"dif":2,"q":"What is a target tracking scaling policy?","o":["A policy that tracks the location of users and routes traffic accordingly","A policy that adjusts capacity to keep a metric at a specific target value","A policy that tracks which instances have been terminated and replaces them","A policy that monitors the target group health of a load balancer only"],"a":1,"e":"Target tracking automatically adjusts capacity to keep a metric (like average CPU at 50%) at a target value you specify — the simplest scaling approach."},{"t":10,"dif":1,"q":"What is the purpose of CloudWatch Logs?","o":["To provide a visual dashboard of all EC2 instance metrics over time","To collect, store, and analyze log data from applications and AWS services","To automatically scale resources based on current traffic patterns","To send SMS notifications when your monthly bill exceeds a threshold"],"a":1,"e":"CloudWatch Logs centralizes log data from applications, Lambda, VPC Flow Logs, and other sources for search, analysis, and alarming."},{"t":10,"dif":3,"q":"What is AWS X-Ray?","o":["A security scanning tool that detects vulnerabilities in EC2 instances","A service for analyzing and debugging distributed applications and microservices","A storage encryption service using x-ray diffraction algorithms","An imaging service that renders 3D models of your cloud architecture"],"a":1,"e":"X-Ray traces requests as they travel through your distributed application, helping you identify performance bottlenecks and errors."},{"t":10,"dif":2,"q":"What is a CloudWatch composite alarm?","o":["An alarm that monitors multiple unrelated AWS accounts simultaneously","An alarm that combines multiple other alarms using AND/OR logic","An alarm that automatically increases in severity over time","An alarm that only triggers during specific hours of the day"],"a":1,"e":"Composite alarms combine the states of multiple alarms using boolean logic (AND/OR) to reduce alarm noise and create more meaningful alerts."},{"t":10,"dif":1,"q":"What is the difference between scheduled and dynamic scaling?","o":["Scheduled uses more resources; dynamic always uses fewer resources","Scheduled scales at set times; dynamic scales based on real-time metrics","Scheduled is free; dynamic scaling requires Business support plan","Scheduled only works with EC2; dynamic works with all services"],"a":1,"e":"Scheduled scaling adjusts capacity at predefined times (e.g., scale up every Monday 8am). Dynamic scaling responds to real-time CloudWatch metrics."},{"t":10,"dif":2,"q":"What are CloudWatch custom metrics?","o":["Metrics that AWS automatically creates for services not yet supported","Metrics you publish to CloudWatch from your own applications or scripts","Metrics that are customized to display in a specific color on dashboards","Metrics that are only available with a paid CloudWatch subscription"],"a":1,"e":"Custom metrics let you push your own application-level data (like active users, queue depth, error rate) into CloudWatch for monitoring and alarming."},{"t":10,"dif":3,"q":"What is Amazon Managed Grafana?","o":["A service for managing database graphics and visualization schemas","A fully managed Grafana service for querying and visualizing operational metrics","A graph database service optimized for social network data models","A tool for generating graphical reports from AWS Cost Explorer data"],"a":1,"e":"Managed Grafana provides scalable, secure Grafana workspaces for visualizing metrics from CloudWatch, Prometheus, X-Ray, and other data sources."},{"t":10,"dif":2,"q":"What is the benefit of using Auto Scaling with a load balancer?","o":["The load balancer makes Auto Scaling completely free of charge","The load balancer distributes traffic across the instances Auto Scaling manages","The load balancer replaces Auto Scaling so you only need one service","The load balancer encrypts all traffic between Auto Scaling instances"],"a":1,"e":"Together they provide HA: Auto Scaling adjusts the number of instances, and the load balancer distributes traffic evenly across healthy ones."},{"t":11,"dif":1,"q":"What is the benefit of using pre-trained AI services like Rekognition?","o":["They require you to train models from scratch with your own data","They add AI capabilities to apps without any ML expertise needed","They are only available to customers with Enterprise support plans","They only work with data stored in DynamoDB tables specifically"],"a":1,"e":"Pre-trained services like Rekognition, Transcribe, and Comprehend let developers add AI features via simple API calls — no ML knowledge required."},{"t":11,"dif":2,"q":"What is the difference between Bedrock and SageMaker?","o":["Bedrock is cheaper; SageMaker is always more expensive for all workloads","Bedrock uses pre-built foundation models; SageMaker builds custom models from scratch","Bedrock is for images only; SageMaker is for text and numbers only","Bedrock requires ML expertise; SageMaker is for beginners only"],"a":1,"e":"Bedrock provides access to pre-built foundation models (Anthropic, Meta, etc.) via API. SageMaker is a full ML platform for building, training, and deploying custom models."},{"t":11,"dif":3,"q":"What is Retrieval-Augmented Generation (RAG) in the context of Bedrock?","o":["A method for generating random test data for database performance testing","Combining a foundation model with your own data sources for accurate, contextual responses","A technique for compressing large AI models to run on smaller instances","An algorithm for automatically generating AWS architecture diagrams"],"a":1,"e":"RAG lets you ground foundation model responses in your own enterprise data — the model retrieves relevant context from your knowledge base before generating a response."},{"t":11,"dif":1,"q":"What does Amazon Transcribe Medical do?","o":["Translates medical documents between different human languages","Converts medical speech (clinical conversations) into accurate text","Analyzes medical images like X-rays and MRIs for abnormalities","Generates medical prescriptions based on patient symptom descriptions"],"a":1,"e":"Transcribe Medical is a specialized speech-to-text service trained on medical terminology for accurately transcribing clinical conversations."},{"t":11,"dif":2,"q":"What is Amazon Lookout for Vision?","o":["A computer vision service for detecting defects in manufactured products","A surveillance camera system for monitoring AWS data center security","A tool for previewing how your website looks on different screen sizes","A service that monitors your CloudWatch dashboards for visual anomalies"],"a":0,"e":"Lookout for Vision uses computer vision to detect visual defects in manufacturing products — spotting scratches, dents, incorrect colors, etc."},{"t":11,"dif":2,"q":"What types of foundation models are available in Amazon Bedrock?","o":["Only Amazon's own Titan models with no third-party options","Models from Amazon, Anthropic, Meta, Cohere, Stability AI, and others","Only open-source models that anyone can download and modify","Only models trained exclusively on AWS documentation and data"],"a":1,"e":"Bedrock offers models from multiple providers — Amazon Titan, Anthropic Claude, Meta Llama, Cohere, Stability AI, and others through a unified API."},{"t":11,"dif":3,"q":"What is Amazon SageMaker JumpStart?","o":["A quick-start wizard for setting up AWS accounts and billing","A hub of pre-trained models, solution templates, and example notebooks for ML","A monitoring service that detects when ML models start performing poorly","A certification program for ML engineers using SageMaker professionally"],"a":1,"e":"JumpStart provides a library of pre-trained models (text, vision, tabular), solution templates, a
